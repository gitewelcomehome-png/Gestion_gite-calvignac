<script>
// console.log('🎯 ========================================');
// console.log('🎯 FICHIER MOBILE CALENDRIER-TARIFS.HTML CHARGÉ');
// console.log('🎯 ========================================');

let currentGiteIdMobile = null;
let currentGiteNameMobile = '';
let currentGiteCapacityMobile = null;
let currentGiteAdresseMobile = '';
let currentGiteContextMobile = {};
let currentMonthMobile = new Date().getMonth();
let currentYearMobile = new Date().getFullYear();
let tarifsCacheMobile = [];
let reservationsCacheMobile = [];
let reglesCacheMobile = null;
let selectedDateMobile = null;
const gitesMetaByIdMobile = new Map();

const LOU_INTELLIGENCE_TARIFAIRE_SYSTEM_PROMPT = `Tu es un expert en revenue management spécialisé dans la location saisonnière de courte durée en France. Ton rôle est d'aider un propriétaire de gîte à positionner ses tarifs de façon optimale par rapport au marché local, en fonction d'une période donnée.

Règles métier:
- Toujours adapter l'analyse aux caractéristiques réelles du gîte.
- Toujours expliciter les bases de calcul avant de proposer des prix.
- Toujours signaler quand les données de marché sont limitées.
- Toujours tenir compte des commissions plateformes pour raisonner en revenu net propriétaire.
- Si un critère gîte est inconnu, l'indiquer explicitement comme non renseigné.

Format attendu:
1) Contexte marché
2) Fourchette de prix recommandée (bas, recommandé, premium)
3) Facteurs clés
4) Recommandations concrètes

Si on te demande du JSON, réponds uniquement en JSON valide.`;

// Couleurs des plateformes (comme desktop)
function getPlateformeColorMobile(plateforme) {
    const colors = {
        'Airbnb': '#FF5A5F',
        'Booking': '#003580',
        'Abritel': '#F5A623',
        'Gites de France': '#27ae60',
        'Direct': '#27ae60',
        'Autre': '#95a5a6'
    };
    return colors[plateforme] || colors['Autre'];
}

async function loadGitesSelectorMobile() {
    // console.log('📅 Chargement sélecteur gîtes mobile...');
    try {
        if (!window.gitesManager) {
            console.error('❌ gitesManager non disponible');
            showToast('Erreur: gitesManager non disponible', 'error');
            return;
        }
        
        const gites = await window.gitesManager.getAll();
        gitesMetaByIdMobile.clear();
        gites.forEach((gite) => {
            if (gite?.id) gitesMetaByIdMobile.set(gite.id, gite);
        });
        // console.log('✅ Gîtes chargés:', gites.length);
        
        const selector = document.getElementById('giteSelectTarifs');
        if (!selector) {
            console.error('❌ Select #giteSelectTarifs non trouvé');
            return;
        }
        
        if (gites.length === 0) {
            selector.innerHTML = '<option value="">Aucun gîte disponible</option>';
            return;
        }
        
        selector.innerHTML = '<option value="">Sélectionner un gîte</option>';
        gites.forEach(gite => {
            selector.innerHTML += `<option value="${gite.id}">${gite.name}</option>`;
        });
        
        // Sélectionner le premier gîte par défaut
        if (gites.length > 0) {
            selector.value = gites[0].id;
            currentGiteIdMobile = gites[0].id;
            // console.log('✅ Gîte sélectionné:', gites[0].name);
            await loadTarifsMobile();
        }
    } catch (error) {
        console.error('Erreur chargement gîtes:', error);
        showToast('Erreur chargement gîtes', 'error');
    }
}

function updateCurrentGiteContextMobile(giteId) {
    const gite = gitesMetaByIdMobile.get(giteId) || {};
    currentGiteContextMobile = gite;

    if (!currentGiteNameMobile && typeof gite.name === 'string') {
        currentGiteNameMobile = gite.name.trim();
    }

    if (!currentGiteAdresseMobile) {
        const adresseCandidate = gite.adresse || gite.address || gite.city || '';
        currentGiteAdresseMobile = String(adresseCandidate || '').trim();
    }

    if (currentGiteCapacityMobile === null || currentGiteCapacityMobile === undefined) {
        const cap = Number(gite.capacity);
        currentGiteCapacityMobile = Number.isFinite(cap) ? cap : null;
    }
}

async function loadTarifsMobile() {
    // console.log('📅 Chargement tarifs pour gîte:', currentGiteIdMobile);
    if (!currentGiteIdMobile) {
        console.warn('⚠️ Pas de gîte sélectionné');
        return;
    }

    resetAnalysePrixIA();
    updateCurrentGiteContextMobile(currentGiteIdMobile);
    
    try {
        const { data: { user } } = await window.supabaseClient.auth.getUser();
        if (!user) {
            console.error('❌ Utilisateur non connecté');
            return;
        }
        
        // console.log('✅ Utilisateur connecté, chargement des données...');
        
        // Charger les tarifs depuis le champ JSON tarifs_calendrier de la table gites
        const { data: giteData, error: errorTarifs } = await window.supabaseClient
            .from('gites')
            .select('tarifs_calendrier, regles_tarifs, address, name, capacity')
            .eq('id', currentGiteIdMobile)
            .single();
        
        if (errorTarifs) throw errorTarifs;

        currentGiteNameMobile = (giteData?.name || '').trim();
        currentGiteAdresseMobile = (giteData?.address || '').trim();
        currentGiteCapacityMobile = Number.isFinite(Number(giteData?.capacity))
            ? Number(giteData.capacity)
            : null;

        currentGiteContextMobile = {
            ...currentGiteContextMobile,
            name: currentGiteNameMobile,
            adresse: currentGiteAdresseMobile,
            capacity: currentGiteCapacityMobile
        };
        
        // Convertir le JSON en tableau
        const tarifData = giteData?.tarifs_calendrier;
        if (Array.isArray(tarifData)) {
            tarifsCacheMobile = tarifData;
        // console.log('✅ Tarifs chargés:', tarifsCacheMobile.length);
        
        } else if (tarifData && typeof tarifData === 'object') {
            tarifsCacheMobile = Object.entries(tarifData).map(([date, prix]) => ({
                date: date,
                prix_nuit: parseFloat(prix)
            }));
        } else {
            tarifsCacheMobile = [];
        }
        
        // Charger les réservations
        if (typeof getAllReservations === 'function') {
            reservationsCacheMobile = await getAllReservations(true);
            // console.log('📋 Réservations totales chargées:', reservationsCacheMobile.length);
            // ✅ Comparer directement les UUID strings (pas de parseInt!)
            reservationsCacheMobile = reservationsCacheMobile.filter(r => r.gite_id === currentGiteIdMobile);
            // console.log('📋 Réservations pour gite_id', currentGiteIdMobile, ':', reservationsCacheMobile.length);
            if (reservationsCacheMobile.length > 0) {
                // console.log('📋 Première réservation:', reservationsCacheMobile[0]);
            }
        } else {
            console.warn('⚠️ getAllReservations non disponible');
        }
        
        // Charger les règles depuis le JSON regles_tarifs
        if (giteData?.regles_tarifs) {
            reglesCacheMobile = giteData.regles_tarifs;
            loadReglesIntoFormMobile();
        }

        // Pré-remplir la région IA depuis l'adresse du gîte
        if (giteData?.address) {
            const regionField = document.getElementById('aiRegionInput');
            if (regionField) {
                // Extraire code postal et ville de l'adresse (ex: "lieu-dit, 46300 Calvignac")
                const matchCP = giteData.address.match(/(\d{5})\s+([\w\s-]+)/i);
                if (matchCP) {
                    const dept = matchCP[1].substring(0, 2);
                    const ville = matchCP[2].trim();
                    regionField.value = `${ville} (${dept})`;
                } else {
                    regionField.value = giteData.address;
                }
            }
        }
        
        // console.log('✅ Render du calendrier...');
        renderCalendrierMobile();
    } catch (error) {
        console.error('Erreur chargement tarifs:', error);
        showToast('Erreur chargement données', 'error');
    }
}

function loadReglesIntoFormMobile() {
    if (!reglesCacheMobile) return;
    
    const dureeMin = document.getElementById('dureeMinMobile');
    if (dureeMin) dureeMin.value = reglesCacheMobile.duree_min_defaut || 2;
    
    const promos = reglesCacheMobile.promotions || {};
    
    if (promos.long_sejour) {
        document.getElementById('promoLongSejour').checked = promos.long_sejour.actif;
        document.getElementById('longSejourNuits').value = promos.long_sejour.a_partir_de || 7;
        document.getElementById('longSejourPct').value = promos.long_sejour.pourcentage || 10;
    }
    
    if (promos.last_minute) {
        document.getElementById('promoLastMinute').checked = promos.last_minute.actif;
        document.getElementById('lastMinuteJours').value = promos.last_minute.jours_avant || 7;
        document.getElementById('lastMinutePct').value = promos.last_minute.pourcentage || 15;
    }
    
    if (promos.early_booking) {
        document.getElementById('promoEarlyBooking').checked = promos.early_booking.actif;
        document.getElementById('earlyBookingJours').value = promos.early_booking.jours_avant || 60;
        document.getElementById('earlyBookingPct').value = promos.early_booking.pourcentage || 10;
    }
}

function renderCalendrierMobile() {
    // console.log('🎨 renderCalendrierMobile() appelée');
    const container = document.getElementById('calendrierTarifsMobile');
    if (!container) {
        console.error('❌ Container #calendrierTarifsMobile non trouvé !');
        return;
    }
    
    // console.log('✅ Container trouvé, génération du calendrier...');
    
    // Afficher le mois actuel
    const monthNames = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 
                        'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
    const monthDisplay = document.getElementById('currentMonthTarifs');
    if (monthDisplay) {
        monthDisplay.textContent = `${monthNames[currentMonthMobile]} ${currentYearMobile}`;
    }
    
    container.innerHTML = '';
    
    // En-têtes des jours
    const jours = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
    jours.forEach(jour => {
        const header = document.createElement('div');
        header.className = 'day-header-mobile';
        header.textContent = jour;
        container.appendChild(header);
    });
    
    // Premier jour du mois
    const firstDay = new Date(currentYearMobile, currentMonthMobile, 1);
    let dayOfWeek = firstDay.getDay();
    dayOfWeek = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    
    // Jours du mois précédent
    for (let i = 0; i < dayOfWeek; i++) {
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'day-card-mobile other-month';
        container.appendChild(emptyDiv);
    }
    
    // Jours du mois
    const lastDay = new Date(currentYearMobile, currentMonthMobile + 1, 0).getDate();

    const aiSuggestionsByDate = {};
    aiSuggestionsCache.forEach((suggestion) => {
        if (suggestion && suggestion.date) {
            aiSuggestionsByDate[suggestion.date] = suggestion;
        }
    });
    
    for (let day = 1; day <= lastDay; day++) {
        const dateObj = new Date(currentYearMobile, currentMonthMobile, day);
        const dateStr = dateObj.toISOString().split('T')[0];
        
        const tarif = tarifsCacheMobile.find(t => t.date === dateStr);
        
        // Vérifier si réservé et récupérer les infos de réservation
        let reservationInfo = null;
        const currentReservation = reservationsCacheMobile.find(resa => {
            const checkIn = new Date(resa.date_arrivee || resa.check_in);
            const checkOut = new Date(resa.date_depart || resa.check_out);
            return dateObj >= checkIn && dateObj < checkOut;
        });
        
        const isReserved = !!currentReservation;
        if (isReserved) {
            reservationInfo = {
                plateforme: currentReservation.origine_reservation || currentReservation.plateforme || 'Direct',
                client: currentReservation.nom_client
            };
        }
        
        const dayCard = document.createElement('div');
        dayCard.className = 'day-card-mobile';
        dayCard.dataset.date = dateStr;

        if (isReserved) {
            dayCard.classList.add('reserved');
            // Remplir toute la case avec la couleur de plateforme
            const plateformeColor = getPlateformeColorMobile(reservationInfo.plateforme);
            dayCard.style.background = plateformeColor;
            dayCard.style.border = '2px solid #2D3436';
        } else if (tarif) {
            dayCard.classList.add('has-tarif');
        }

        // Mode demande : colorer les cases selon le niveau de demande
        if (aiModeActif === 'demande' && !isReserved && aiDemandeCache[dateStr]) {
            dayCard.classList.add(`ai-demande-${aiDemandeCache[dateStr]}`);
        }

        // Badge IA : vérifier si la date a une suggestion
        const aiSugg = aiSuggestionsByDate[dateStr] || null;
        if (aiSugg && !isReserved) {
            dayCard.classList.add(`ai-${aiSugg.type}`);
            dayCard.title = aiSugg.label;
        }

        const demandeLabel = (aiModeActif === 'demande' && aiDemandeCache[dateStr] === 'haute') ? '🔥' :
                             (aiModeActif === 'demande' && aiDemandeCache[dateStr] === 'faible') ? '💤' : '';

        const prixExistant = tarif ? Number(tarif.prix_nuit) : null;
        const suggestionPrix = aiSugg ? Number(aiSugg.prixSuggere) : null;
        const showSuggestedPrice = Boolean(aiSugg && !isReserved && Number.isFinite(suggestionPrix));

        let prixHtml = '<div style="font-size: 0.65rem; color: var(--text-secondary);">—</div>';
        if (isReserved) {
            prixHtml = '<div style="font-size: 0.55rem; color: rgba(255,255,255,0.9); font-weight: 600;">🔒</div>';
        } else if (showSuggestedPrice) {
            const basePart = Number.isFinite(prixExistant)

/**
 * Retourne le niveau de demande d'une date : 'haute', 'normale', ou 'faible'
 */
function getDemandePourDate(dateStr, zone) {
    const annee = new Date(dateStr).getFullYear();
    const feriesByDate = {};
    getFeriesNationaux(annee).forEach(f => { feriesByDate[f.date] = true; });

    // Férié → haute demande
    if (feriesByDate[dateStr]) return 'haute';

    // Vacances scolaires → haute demande
    const vacances = getVacancesScolaires(zone || 'B');
    if (getVacanceForDate(dateStr, vacances)) return 'haute';

    // Juillet et août → haute demande
    const mois = new Date(dateStr).getMonth(); // 0-indexed
    if (mois === 6 || mois === 7) return 'haute';

    // Weekends en juin / septembre → normale
    const jourSemaine = new Date(dateStr).getDay();
    if ((mois === 5 || mois === 8) && (jourSemaine === 0 || jourSemaine === 6)) return 'haute';

    // Novembre, janvier, février, décembre (hors fêtes) → faible
    if ([0, 1, 10].includes(mois)) return 'faible';

    return 'normale';
}

/**
 * Calcule le dimanche de Pâques (algorithme de Oudin/Tondering)
 */
function getPaques(year) {
    const a = year % 19;
    const b = Math.floor(year / 100);
    const c = year % 100;
    const d = Math.floor(b / 4);
    const e = b % 4;
    const f = Math.floor((b + 8) / 25);
    const g = Math.floor((b - f + 1) / 3);
    const h = (19 * a + b - d - g + 15) % 30;
    const i = Math.floor(c / 4);
    const k = c % 4;
    const l = (32 + 2 * e + 2 * i - h - k) % 7;
    const m = Math.floor((a + 11 * h + 22 * l) / 451);
    const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
    const day = ((h + l - 7 * m + 114) % 31) + 1;
    return new Date(year, month, day);
}

/**
 * Retourne tous les jours fériés nationaux en France pour une année donnée
 */
function getFeriesNationaux(year) {
    const paques = getPaques(year);
    const addDays = (date, n) => {
        const d = new Date(date);
        d.setDate(d.getDate() + n);
        return d;
    };
    const fmt = (d) => d.toISOString().split('T')[0];

    return [
        { date: fmt(new Date(year, 0, 1)),  label: "Jour de l'An" },
        { date: fmt(addDays(paques, 1)),     label: "Lundi de Pâques" },
        { date: fmt(new Date(year, 4, 1)),   label: "Fête du Travail" },
        { date: fmt(new Date(year, 4, 8)),   label: "Victoire 1945" },
        { date: fmt(addDays(paques, 39)),    label: "Ascension" },
        { date: fmt(addDays(paques, 50)),    label: "Lundi de Pentecôte" },
        { date: fmt(new Date(year, 6, 14)),  label: "Fête Nationale" },
        { date: fmt(new Date(year, 7, 15)),  label: "Assomption" },
        { date: fmt(new Date(year, 10, 1)),  label: "Toussaint" },
        { date: fmt(new Date(year, 10, 11)), label: "Armistice" },
        { date: fmt(new Date(year, 11, 25)), label: "Noël" }
    ];
}

        }
    }

/**
 * Analyse les dates de la période sélectionnée et génère des suggestions
 * @param {boolean} withAI - inclure les événements locaux via OpenAI
 */
async function analyserDatesIA(withAI = false) {
    // Utiliser le mois affiché si aucune date n'est fournie
    const premierJourMois = new Date(currentYearMobile, currentMonthMobile, 1).toISOString().split('T')[0];
    const dernierJourMois = new Date(currentYearMobile, currentMonthMobile + 1, 0).toISOString().split('T')[0];
    const dateDebut = premierJourMois;
    const dateFin = dernierJourMois;
    const prixBase = parseFloat(document.getElementById('aiPrixBase').value);
    const zone = document.getElementById('aiZoneScolaire').value;
    const region = document.getElementById('aiRegionInput').value.trim();
    if (!prixBase || prixBase <= 0) {
        showToast('Veuillez saisir un prix de base', 'error');
        return;
    }

    const multFeries = parseFloat(document.getElementById('multFeries').value) || 1.5;
    const multVacances = parseFloat(document.getElementById('multVacances').value) || 1.3;
    const multEvents = parseFloat(document.getElementById('multEvents').value) || 1.2;

    // Afficher le spinner
    const loadingEl = document.getElementById('ai-loading');
    const container = document.getElementById('ai-suggestions-container');
    loadingEl.style.display = 'block';
    container.style.display = 'none';

    try {
        // 1. Collecter les fériés et vacances
        const suggestions = [];
        const anneeDebut = new Date(dateDebut).getFullYear();
        const anneeFin = new Date(dateFin).getFullYear();

        // Construire la liste des fériés pour toutes les années concernées
        const feriesByDate = {};
        for (let y = anneeDebut; y <= anneeFin; y++) {
            getFeriesNationaux(y).forEach(f => {
                feriesByDate[f.date] = f.label;
            });
        }

        // Périodes de vacances pour la zone
        const vacances = getVacancesScolaires(zone);

        // Parcourir chaque date de la période
        const current = new Date(dateDebut);
        const end = new Date(dateFin);

        while (current <= end) {
            const dateStr = current.toISOString().split('T')[0];

            // Vérifier si férié
            if (feriesByDate[dateStr]) {
                const prixSuggere = Math.round(prixBase * multFeries);
                suggestions.push({
                    date: dateStr,
                    label: feriesByDate[dateStr],
                    type: 'ferie',
                    icon: '🎉',
                    prixBase,
                    prixSuggere,
                    multiplicateur: multFeries
                });
            } else {
                // Vérifier si vacances scolaires
                const vacLabel = getVacanceForDate(dateStr, vacances);
                if (vacLabel) {
                    const prixSuggere = Math.round(prixBase * multVacances);
                    suggestions.push({
                        date: dateStr,
                        label: `Vacances — ${vacLabel} (Zone ${zone})`,
                        type: 'vacances',
                        icon: '🏫',
                        prixBase,
                        prixSuggere,
                        multiplicateur: multVacances
                    });
                }
            }

            current.setDate(current.getDate() + 1);
        }

        // 2. Si withAI → appeler OpenAI pour les événements locaux
        if (withAI && region) {
            const eventsIA = await fetchEvenementsIA({
                region,
                dateDebut,
                dateFin,
                giteName: currentGiteNameMobile,
                giteAddress: currentGiteAdresseMobile,
                capacity: currentGiteCapacityMobile
            });
            eventsIA.forEach(ev => {
                // Éviter les doublons avec les fériés/vacances déjà détectés
                const existeDeja = suggestions.find(s => s.date === ev.date);
                if (!existeDeja) {
                    const prixSuggere = Math.round(prixBase * multEvents);
                    suggestions.push({
                        date: ev.date,
                        label: ev.label,
                        type: 'event',
                        icon: '⭐',
                        prixBase,
                        prixSuggere,
                        multiplicateur: multEvents
                    });
                }
            });
        }

        // Trier par date
        suggestions.sort((a, b) => a.date.localeCompare(b.date));

        // Filtrer uniquement les dates non encore tarifées ou avec un tarif inférieur
        const suggestionsUtiles = suggestions.filter(s => {
            const tarifExistant = tarifsCacheMobile.find(t => t.date === s.date);
            return !tarifExistant || tarifExistant.prix_nuit < s.prixSuggere;
        });

        // Mettre en cache uniquement les suggestions actionnables pour le rendu calendrier
        aiSuggestionsCache = suggestionsUtiles;
        renderCalendrierMobile(); // Rafraîchir pour afficher les badges

        if (withAI) {
            aiMarketAnalysisLast = await fetchAnalyseTarifaireLOU({
                dateDebut,
                dateFin,
                prixBase,
                region,
                zone,
                suggestions,
                suggestionsUtiles
            });
        } else {
            aiMarketAnalysisLast = null;
        }

        afficherAnalyseSousCalendrier(suggestions, suggestionsUtiles, withAI, zone);
        afficherSuggestionsIA(suggestionsUtiles);

    } catch (err) {
        console.error('Erreur analyse IA:', err);
        showToast('Erreur lors de l\'analyse', 'error');
    } finally {
        loadingEl.style.display = 'none';
    }
}

/**
 * Appelle l'API OpenAI pour obtenir les événements locaux/touristiques
 */
async function fetchEvenementsIA({ region, dateDebut, dateFin, giteName, giteAddress, capacity }) {
    try {
    const prompt = `Tu es un analyste revenue management pour gîte en France.
Contexte gîte:
- Nom: ${giteName || 'non renseigné'}
- Localisation cible: ${region}
- Adresse complète (si disponible): ${giteAddress || 'non renseignée'}
- Capacité couchages: ${capacity || 'non renseignée'} personnes
- Période d'analyse: du ${dateDebut} au ${dateFin}

Objectif:
1) Identifier les principaux événements touristiques, festivals, marchés importants et pics d'affluence locaux pour cette zone.
2) Prioriser les événements pertinents pour un gîte de cette capacité.

Contraintes de réponse:
- Réponds UNIQUEMENT avec un tableau JSON valide, sans texte avant/après.
- Format strict: [{"date":"YYYY-MM-DD","label":"Nom de l'événement"},...]
- Si un événement dure plusieurs jours, liste chaque jour séparément.
- Maximum 30 entrées.
- Si une date n'est pas fiable, n'inclus pas l'événement.
- N'invente pas d'événement.`;

        const response = await fetch('/api/openai', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                prompt,
                maxTokens: 800,
                model: 'gpt-4o-mini',
                webSearch: true,
                webSearchModel: 'gpt-4.1-mini'
            })
        });

        if (!response.ok) {
            console.warn('⚠️ OpenAI API non disponible, événements locaux ignorés');
            return [];
        }

        const data = await response.json();
        aiWebSearchLastStatus = typeof data?.webSearchUsed === 'boolean' ? data.webSearchUsed : null;
        const content = data?.content || data?.choices?.[0]?.message?.content || '';

        // Extraire le JSON de la réponse
        const jsonMatch = content.match(/\[[\s\S]*\]/);
        if (!jsonMatch) return [];

        const events = JSON.parse(jsonMatch[0]);
        if (!Array.isArray(events)) return [];

        // Valider le format de chaque événement
        return events.filter(e => e.date && e.label && /^\d{4}-\d{2}-\d{2}$/.test(e.date));

    } catch (err) {
        console.warn('⚠️ Erreur récupération événements IA:', err.message);
        return [];
    }
}

            lits: meta.beds ?? meta.nb_lits ?? null,
            sallesDeBain: meta.bathrooms ?? meta.nb_salles_bain ?? null,
            superficieM2: meta.surface_m2 ?? meta.superficie ?? null,
            typeHebergement: meta.type || meta.type_hebergement || null,
            label: meta.label || meta.classement || null,
            amenities: Array.isArray(meta.amenities) ? meta.amenities : []
        };

        const prompt = `Analyse tarifaire LOU pour la période du ${dateDebut} au ${dateFin}.

Profil hébergement:
${JSON.stringify(profil, null, 2)}

Contexte de tarification actuel:
- Prix de base saisi par le propriétaire: ${prixBase}€ / nuit
- Zone scolaire: ${zone}
- Marché cible par défaut: local strict autour de ${region}
- Nombre total de signaux détectés (fériés/vacances/événements): ${suggestions.length}
- Nombre de dates réellement actionnables: ${suggestionsUtiles.length}

Contraintes de sortie:
- Réponds UNIQUEMENT en JSON valide.
- Structure obligatoire:
{
  "contexte_marche": "...",
  "fourchette": {
    "nuit": { "bas": number, "recommande": number, "premium": number },
    "weekend": { "bas": number, "recommande": number, "premium": number },
    "semaine": { "bas": number, "recommande": number, "premium": number }
  },
  "facteurs_cles": ["...", "...", "..."],
  "recommandations": ["...", "...", "..."],
  "fiabilite": { "niveau": "faible|moyenne|élevée", "commentaire": "..." },
  "position_tarif_actuel": { "diagnostic": "sous_marche|dans_marche|sur_marche", "ecart_pct": number }
}

Rappels:
- Ne jamais proposer de prix sans base explicite.
- Adapter les comparables à la capacité et au type d'hébergement.
- Prendre en compte la réalité des commissions plateformes dans le raisonnement.
- Si données marché insuffisantes, le dire clairement dans fiabilite.commentaire.`;

        const response = await fetch('/api/openai', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                prompt,
                systemPrompt: LOU_INTELLIGENCE_TARIFAIRE_SYSTEM_PROMPT,
                maxTokens: 1400,
                model: 'gpt-4o-mini',
                webSearch: true,
                webSearchModel: 'gpt-4.1-mini'
            })
        });

        if (!response.ok) {
            console.warn('⚠️ Analyse marché LOU indisponible');
            return null;
        }

        const payload = await response.json();
        if (typeof payload?.webSearchUsed === 'boolean') {
            aiWebSearchLastStatus = payload.webSearchUsed;
        }

        const raw = payload?.content || '';
        const jsonMatch = raw.match(/\{[\s\S]*\}/);
        if (!jsonMatch) return null;

        const parsed = JSON.parse(jsonMatch[0]);
        return parsed && typeof parsed === 'object' ? parsed : null;
    } catch (error) {
        console.warn('⚠️ Erreur analyse marché LOU:', error?.message || error);
        return null;
    }
}

/**
 * Affiche la liste des suggestions IA dans l'interface
 */
function afficherSuggestionsIA(suggestions) {
    const container = document.getElementById('ai-suggestions-container');
    const list = document.getElementById('ai-suggestions-list');
    const countEl = document.getElementById('ai-suggestions-count');

    if (suggestions.length === 0) {
        countEl.textContent = 'Aucune suggestion — les tarifs sont déjà optimaux pour cette période.';
        list.innerHTML = '';
        container.style.display = 'block';
        return;
    }

    countEl.textContent = `${suggestions.length} suggestion${suggestions.length > 1 ? 's' : ''} de tarifs`;

    list.innerHTML = suggestions.map((s, idx) => {
        const dateObj = new Date(s.date + 'T12:00:00');
        const dateFr = dateObj.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
        return `
        <div class="ai-suggestion-card" id="ai-card-${idx}" data-date="${s.date}" data-prix="${s.prixSuggere}">
            <span class="ai-suggestion-icon">${s.icon}</span>
            <div class="ai-suggestion-info">
                <div class="ai-suggestion-date">${dateFr}</div>
                <div class="ai-suggestion-label">${s.label}</div>
            </div>
            <div class="ai-suggestion-price">
                <span class="ai-suggestion-price-amount">${s.prixSuggere}€</span>
                <span class="ai-suggestion-price-base">${s.prixBase}€</span>
            </div>
            <button class="btn-ai-apply" onclick="accepterSuggestionIA('${s.date}', ${s.prixSuggere}, 'ai-card-${idx}')">
                ✓
            </button>
        </div>`;
    }).join('');

    container.style.display = 'block';
}

function afficherAnalyseSousCalendrier(suggestions, suggestionsUtiles, withAI, zone) {
    const panel = document.getElementById('ai-calendar-analysis');
    const content = document.getElementById('ai-calendar-analysis-content');
    if (!panel || !content) return;

    const total = suggestions.length;
    const actionnables = suggestionsUtiles.length;
    const feries = suggestions.filter(s => s.type === 'ferie').length;
    const vacances = suggestions.filter(s => s.type === 'vacances').length;
    const events = suggestions.filter(s => s.type === 'event').length;
    const hausseMoyenne = actionnables > 0
        ? Math.round(
            suggestionsUtiles.reduce((acc, suggestion) => {
                const ratio = suggestion.prixBase > 0
                    ? ((suggestion.prixSuggere - suggestion.prixBase) / suggestion.prixBase) * 100
                    : 0;
                return acc + Math.max(0, ratio);
            }, 0) / actionnables
        )
        : 0;

    const hasMarket = Boolean(aiMarketAnalysisLast && typeof aiMarketAnalysisLast === 'object');
    const marche = aiMarketAnalysisLast || {};
    const fourchette = marche.fourchette || {};
    const nuit = fourchette.nuit || {};
    const weekend = fourchette.weekend || {};
    const semaine = fourchette.semaine || {};
    const facteurs = Array.isArray(marche.facteurs_cles) ? marche.facteurs_cles.slice(0, 4) : [];
    const recos = Array.isArray(marche.recommandations) ? marche.recommandations.slice(0, 3) : [];

    content.innerHTML = `
        <div style="display:grid; gap:4px;">
            <div>📌 <strong>${actionnables}</strong> date${actionnables > 1 ? 's' : ''} à ajuster sur <strong>${total}</strong> date${total > 1 ? 's' : ''} détectée${total > 1 ? 's' : ''}.</div>
            <div>🗓️ Répartition: ${feries} férié${feries > 1 ? 's' : ''}, ${vacances} vacances (zone ${zone})${withAI ? `, ${events} événement${events > 1 ? 's' : ''} local${events > 1 ? 'aux' : ''}` : ''}.</div>
            ${withAI ? `<div>🌐 Sources événements: ${aiWebSearchLastStatus === true ? '<strong>sondage web activé</strong>' : aiWebSearchLastStatus === false ? '<strong>fallback sans web</strong>' : '<strong>statut indisponible</strong>'}.</div>` : ''}
            <div>📈 Hausse moyenne suggérée: <strong>+${hausseMoyenne}%</strong> sur les dates actionnables.</div>
            <div style="font-size:0.74rem; opacity:0.9;">Les prix affichés dans le calendrier sont des recommandations IA prêtes à appliquer.</div>
            ${hasMarket ? `
                <div style="margin-top:8px; padding-top:8px; border-top:1px solid var(--border-color);">
                    <div><strong>1) Contexte marché</strong></div>
                    <div style="font-size:0.78rem; color:var(--text-secondary);">${marche.contexte_marche || 'Contexte non disponible.'}</div>
                    <div style="margin-top:6px;"><strong>2) Fourchette recommandée</strong></div>
                    <div style="font-size:0.78rem; color:var(--text-secondary);">Nuit: ${nuit.bas ?? '-'}€ / ${nuit.recommande ?? '-'}€ / ${nuit.premium ?? '-'}€</div>
                    <div style="font-size:0.78rem; color:var(--text-secondary);">Week-end: ${weekend.bas ?? '-'}€ / ${weekend.recommande ?? '-'}€ / ${weekend.premium ?? '-'}€</div>
                    <div style="font-size:0.78rem; color:var(--text-secondary);">Semaine: ${semaine.bas ?? '-'}€ / ${semaine.recommande ?? '-'}€ / ${semaine.premium ?? '-'}€</div>
                    <div style="margin-top:6px;"><strong>3) Facteurs clés</strong></div>
                    <div style="font-size:0.78rem; color:var(--text-secondary);">${facteurs.length ? facteurs.join(' • ') : 'Non disponible.'}</div>
                    <div style="margin-top:6px;"><strong>4) Recommandations concrètes</strong></div>
                    <div style="font-size:0.78rem; color:var(--text-secondary);">${recos.length ? recos.join(' • ') : 'Non disponible.'}</div>
                    <div style="margin-top:6px; font-size:0.74rem; color:var(--text-secondary);">Fiabilité: <strong>${marche?.fiabilite?.niveau || 'non précisée'}</strong>${marche?.fiabilite?.commentaire ? ` — ${marche.fiabilite.commentaire}` : ''}</div>
                </div>
            ` : ''}
        </div>
    `;

    panel.style.display = 'block';
}

/**
 * Applique une suggestion IA au cache des tarifs et sauvegarde
 */
async function accepterSuggestionIA(dateStr, prixSuggere, cardId) {
    if (!currentGiteIdMobile) return;

    try {
        // Mettre à jour le cache local
        const existingIndex = tarifsCacheMobile.findIndex(t => t.date === dateStr);
        if (existingIndex > -1) {
            tarifsCacheMobile[existingIndex].prix_nuit = prixSuggere;
        } else {
            tarifsCacheMobile.push({ date: dateStr, prix_nuit: prixSuggere });
        }

        // Sauvegarder en base
        const { error } = await window.supabaseClient
            .from('gites')
            .update({ tarifs_calendrier: tarifsCacheMobile })
            .eq('id', currentGiteIdMobile);

        if (error) throw error;

        // Marquer la carte comme appliquée
        const card = document.getElementById(cardId);
        if (card) {
            card.classList.add('applied');
            const btn = card.querySelector('.btn-ai-apply');
            if (btn) {
                btn.textContent = '✓';
                btn.classList.add('btn-ai-applied');
                btn.disabled = true;
            }
        }

        renderCalendrierMobile();
    } catch (err) {
        console.error('Erreur application suggestion:', err);
        showToast('Erreur lors de l\'application', 'error');
    }
}

/**
 * Applique toutes les suggestions d'un coup
 */
async function appliquerToutesSuggestions() {
    const cards = document.querySelectorAll('.ai-suggestion-card:not(.applied)');
    if (cards.length === 0) return;

    const btn = document.getElementById('btnAIAppliquerTout');
    if (btn) btn.disabled = true;

    let count = 0;
    for (const card of cards) {
        const dateStr = card.dataset.date;
        const prix = parseFloat(card.dataset.prix);
        if (dateStr && prix) {
            const existingIndex = tarifsCacheMobile.findIndex(t => t.date === dateStr);
            if (existingIndex > -1) {
                tarifsCacheMobile[existingIndex].prix_nuit = prix;
            } else {
                tarifsCacheMobile.push({ date: dateStr, prix_nuit: prix });
            }
            card.classList.add('applied');
            const applyBtn = card.querySelector('.btn-ai-apply');
            if (applyBtn) {
                applyBtn.textContent = '✓';
                applyBtn.classList.add('btn-ai-applied');
                applyBtn.disabled = true;
            }
            count++;
        }
    }

    try {
        const { error } = await window.supabaseClient
            .from('gites')
            .update({ tarifs_calendrier: tarifsCacheMobile })
            .eq('id', currentGiteIdMobile);

        if (error) throw error;

        showToast(`✅ ${count} tarif${count > 1 ? 's' : ''} appliqué${count > 1 ? 's' : ''}`, 'success');
        renderCalendrierMobile();
    } catch (err) {
        console.error('Erreur application groupée:', err);
        showToast('Erreur lors de l\'application', 'error');
        if (btn) btn.disabled = false;
    }
}
