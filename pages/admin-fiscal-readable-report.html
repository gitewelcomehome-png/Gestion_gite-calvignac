<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Sentry Error Monitoring -->
    <script
      src="https://js-de.sentry-cdn.com/20fdc3b052d0030ec6c745effaedaf31.min.js"
      crossorigin="anonymous"
    ></script>
  <title>Rapport fiscal client — synthèse métier</title>
  <script src="../js/taux-fiscaux-config.js"></script>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .top-actions { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 10px; }
    .top-actions button { border: 1px solid #cbd5e1; background: #fff; color: #1e293b; border-radius: 8px; padding: 8px 10px; cursor: pointer; font-weight: 700; }
    .hero { background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); color: #fff; border-radius: 14px; padding: 22px; }
    .hero h1 { margin: 0 0 8px 0; font-size: 28px; }
    .hero p { margin: 4px 0; opacity: 0.95; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-top: 16px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; }
    .card h2 { margin: 0 0 10px 0; font-size: 18px; color: #0f172a; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .ok { background: #dcfce7; color: #166534; }
    .warn { background: #fef3c7; color: #92400e; }
    ul { margin: 8px 0 0 18px; padding: 0; }
    li { margin: 6px 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 8px 6px; text-align: left; }
    th { background: #f8fafc; font-size: 13px; color: #334155; }
    .full { grid-column: 1 / -1; }
    .tip { margin-top: 14px; background: #ecfeff; border-left: 4px solid #0891b2; padding: 10px 12px; border-radius: 6px; }
    .error { background: #fee2e2; border-left: 4px solid #b91c1c; color: #7f1d1d; padding: 10px 12px; border-radius: 6px; margin-top: 12px; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container" id="reportRoot">
    <div class="top-actions">
      <button type="button" id="btnRefresh">Rafraîchir</button>
      <button type="button" id="btnExport">Exporter HTML</button>
    </div>
    <div id="reportContent"></div>
  </div>

  <script>
    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function parseFiscalRulesFromSources(sources) {
      const fiscalConfig = sources.taux_fiscaux_config?.content || '';
      const fiscalEngine = sources.fiscalite_client?.content || '';

      // TAUX_FISCAUX est chargé via <script> tag dans le <head>
      // new Function() est bloqué par la CSP (pas d'unsafe-eval)
      const taux = window.TAUX_FISCAUX || null;

      const c2024 = taux?.getConfig ? taux.getConfig(2024) : null;
      const c2025 = taux?.getConfig ? taux.getConfig(2025) : null;
      const c2026 = taux?.getConfig ? taux.getConfig(2026) : null;

      const extractNumber = (content, pattern) => {
        const match = content.match(pattern);
        return match ? Number(match[1]) : null;
      };

      const seuilAmortHT = extractNumber(fiscalEngine, /SEUIL_AMORTISSEMENT_HT:\s*(\d+(?:\.\d+)?)/);
      const seuilAmortTTC = extractNumber(fiscalEngine, /SEUIL_AMORTISSEMENT_TTC:\s*(\d+(?:\.\d+)?)/);
      const seuilExonerationLMNP = extractNumber(fiscalEngine, /SEUIL_EXONERATION_LMNP\s*=\s*(\d+(?:\.\d+)?)/);
      const seuilCALMP = extractNumber(fiscalEngine, /critereCA_LMP\s*=\s*ca\s*>\s*(\d+(?:\.\d+)?)/);

      return {
        pass: {
          y2024: c2024?.PASS ?? null,
          y2025: c2025?.PASS ?? null,
          y2026: c2026?.PASS ?? null
        },
        smicHoraire: {
          y2024: c2024?.SMIC_HORAIRE ?? null,
          y2025: c2025?.SMIC_HORAIRE ?? null,
          y2026: c2026?.SMIC_HORAIRE ?? null
        },
        baremeIR: {
          y2024: c2024?.BAREME_IR || [],
          y2025: c2025?.BAREME_IR || [],
          y2026: c2026?.BAREME_IR || []
        },
        microBIC: c2026?.MICRO_BIC || c2025?.MICRO_BIC || {},
        urssaf: c2026?.URSSAF || c2025?.URSSAF || {},
        cotisationsMinimales: c2026?.COTISATIONS_MINIMALES || c2025?.COTISATIONS_MINIMALES || {},
        retraite: c2026?.RETRAITE || c2025?.RETRAITE || {},
        abattementSalaire: c2026?.ABATTEMENT_SALAIRE || c2025?.ABATTEMENT_SALAIRE || {},
        amortissement: {
          seuilHT: seuilAmortHT,
          seuilTTC: seuilAmortTTC
        },
        statuts: {
          seuilExonerationLMNP,
          seuilCALMP,
          lmpCritereRecettes: 'Recettes locatives > autres revenus professionnels du foyer'
        },
        conformite: {
          lmnpDeficitReportable10Ans: fiscalEngine.includes('deficitLMNPReportable'),
          lmnpDeficitNonImputableGlobal: fiscalEngine.includes('revenuLMNPRetenuIR = Math.max(0, beneficeLMNP)'),
          irLocationNonNegatif: fiscalEngine.includes('Math.max(0, irImpactLocation)'),
          lmpDeficitImputableGlobal: fiscalEngine.includes('Déficit LMP imputable au revenu global'),
          baremeKMFallback2024: !!(window.TAUX_FISCAUX?.TAUX_ANNEES?.[2024]?.BAREME_KM)
        }
      };
    }

    function buildHtml({ exportedAt, exportedBy, rules }) {
      const formatNumber = (value) => Number.isFinite(value) ? new Intl.NumberFormat('fr-FR').format(value) : 'N/D';
      const formatPercent = (value) => Number.isFinite(value) ? `${(value * 100).toFixed(2)}%` : 'N/D';
      const formatAmount = (value) => Number.isFinite(value) ? `${new Intl.NumberFormat('fr-FR').format(value)} €` : 'N/D';
      const formatEuroMaybe = (value) => Number.isFinite(value) ? `${new Intl.NumberFormat('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value)} €` : 'N/D';

      const irRows = (rules.baremeIR?.y2026 || []).map((tranche) => `
        <tr>
          <td>${tranche.max === Infinity ? 'Au-delà' : `Jusqu\'à ${formatNumber(tranche.max)} €`}</td>
          <td>${formatPercent(tranche.taux)}</td>
        </tr>
      `).join('');

      const urssaf = rules.urssaf || {};
      const microBIC = rules.microBIC || {};
      const cotisationsMin = rules.cotisationsMinimales || {};
      const retraite = rules.retraite || {};
      const abattementSalaire = rules.abattementSalaire || {};

      return `
        <section class="hero">
          <h1>Rapport fiscal client — synthèse des règles appliquées</h1>
          <p>Exporté le ${escapeHtml(exportedAt)} par ${escapeHtml(exportedBy)}</p>
          <p>Document métier sans code source — conçu pour lecture administrative et contrôle.</p>
        </section>

        <section class="grid">
          <article class="card">
            <h2>1) Cadre LMNP / LMP</h2>
            <ul>
              <li>Seuil exonération cotisations LMNP : <strong>${formatAmount(rules.statuts?.seuilExonerationLMNP)}</strong></li>
              <li>Seuil CA critère LMP : <strong>${formatAmount(rules.statuts?.seuilCALMP)}</strong></li>
              <li>Critère complémentaire LMP : <strong>${escapeHtml(rules.statuts?.lmpCritereRecettes || 'N/D')}</strong></li>
            </ul>
          </article>

          <article class="card">
            <h2>2) PASS & SMIC (config annuelle)</h2>
            <table>
              <thead><tr><th>Année</th><th>PASS</th><th>SMIC horaire</th></tr></thead>
              <tbody>
                <tr><td>2024</td><td>${formatAmount(rules.pass?.y2024)}</td><td>${rules.smicHoraire?.y2024 ?? 'N/D'} €</td></tr>
                <tr><td>2025</td><td>${formatAmount(rules.pass?.y2025)}</td><td>${rules.smicHoraire?.y2025 ?? 'N/D'} €</td></tr>
                <tr><td>2026</td><td>${formatAmount(rules.pass?.y2026)}</td><td>${rules.smicHoraire?.y2026 ?? 'N/D'} €</td></tr>
              </tbody>
            </table>
          </article>

          <article class="card">
            <h2>3) Barème IR appliqué (année 2026)</h2>
            <table>
              <thead><tr><th>Tranche</th><th>Taux</th></tr></thead>
              <tbody>${irRows || '<tr><td colspan="2">N/D</td></tr>'}</tbody>
            </table>
          </article>

          <article class="card">
            <h2>4) Cotisations URSSAF (principaux taux)</h2>
            <ul>
              <li>Maladie-maternité : <strong>${formatPercent(urssaf.maladie?.taux)}</strong> (exonération jusqu'à <strong>${formatAmount(urssaf.maladie?.seuil_exoneration)}</strong>)</li>
              <li>Indemnités journalières : <strong>${formatPercent(urssaf.indemnites_journalieres?.taux)}</strong></li>
              <li>Retraite de base : <strong>${formatPercent(urssaf.retraite_base?.taux)}</strong> (plafond base : <strong>${formatAmount(urssaf.retraite_base?.plafond)}</strong>)</li>
              <li>Retraite complémentaire : <strong>${formatPercent(urssaf.retraite_complementaire?.taux)}</strong></li>
              <li>Invalidité décès : <strong>${formatPercent(urssaf.invalidite_deces?.taux)}</strong></li>
              <li>CSG/CRDS : <strong>${formatPercent(urssaf.csg_crds?.taux)}</strong></li>
              <li>Formation pro : <strong>${formatPercent(urssaf.formation_pro?.taux)}</strong> (base PASS)</li>
              <li>Allocations familiales : 0 → <strong>${formatPercent(urssaf.allocations_familiales?.taux_max)}</strong></li>
            </ul>
          </article>

          <article class="card">
            <h2>5) Micro-BIC (seuils/taux)</h2>
            <ul>
              <li>Plafond non classé : <strong>${formatAmount(microBIC.plafond_non_classe)}</strong></li>
              <li>Plafond classé : <strong>${formatAmount(microBIC.plafond_classe)}</strong></li>
              <li>Abattement non classé : <strong>${formatPercent(microBIC.abattement_non_classe)}</strong></li>
              <li>Abattement classé : <strong>${formatPercent(microBIC.abattement_classe)}</strong></li>
            </ul>
          </article>

          <article class="card">
            <h2>6) Amortissements & véhicule</h2>
            <ul>
              <li>Seuil amortissement HT : <strong>${formatAmount(rules.amortissement?.seuilHT)}</strong></li>
              <li>Seuil amortissement TTC : <strong>${formatAmount(rules.amortissement?.seuilTTC)}</strong></li>
              <li>Cotisations minimales SSI applicables : <strong>${cotisationsMin.applicable ? 'Oui' : 'Non'}</strong> (${formatAmount(cotisationsMin.montant)})</li>
              <li>Barème KM fallback 2024 :
                <span class="badge ${rules.conformite?.baremeKMFallback2024 ? 'ok' : 'warn'}">${rules.conformite?.baremeKMFallback2024 ? 'Actif' : 'À vérifier'}</span>
              </li>
            </ul>
          </article>

          <article class="card">
            <h2>7) Retraite (validation trimestres)</h2>
            <ul>
              <li>SMIC horaire retenu : <strong>${formatEuroMaybe(retraite.smic_horaire)}</strong></li>
              <li>Heures par trimestre : <strong>${Number.isFinite(retraite.heures_par_trimestre) ? retraite.heures_par_trimestre : 'N/D'}</strong></li>
              <li>Seuil 1 trimestre : <strong>${formatAmount(retraite.trimestre_1)}</strong></li>
              <li>Seuil 2 trimestres : <strong>${formatAmount(retraite.trimestre_2)}</strong></li>
            </ul>
          </article>

          <article class="card">
            <h2>8) Abattement salaires</h2>
            <ul>
              <li>Taux d'abattement : <strong>${formatPercent(abattementSalaire.taux)}</strong></li>
              <li>Minimum : <strong>${formatAmount(abattementSalaire.minimum)}</strong></li>
              <li>Maximum : <strong>${formatAmount(abattementSalaire.maximum)}</strong></li>
            </ul>
          </article>

          <article class="card full">
            <h2>9) Contrôles de conformité intégrés</h2>
            <ul>
              <li>Déficit LMNP non imputable revenu global : <span class="badge ${rules.conformite?.lmnpDeficitNonImputableGlobal ? 'ok' : 'warn'}">${rules.conformite?.lmnpDeficitNonImputableGlobal ? 'Oui' : 'À vérifier'}</span></li>
              <li>Déficit LMNP reportable 10 ans : <span class="badge ${rules.conformite?.lmnpDeficitReportable10Ans ? 'ok' : 'warn'}">${rules.conformite?.lmnpDeficitReportable10Ans ? 'Oui' : 'À vérifier'}</span></li>
              <li>IR location jamais négatif : <span class="badge ${rules.conformite?.irLocationNonNegatif ? 'ok' : 'warn'}">${rules.conformite?.irLocationNonNegatif ? 'Oui' : 'À vérifier'}</span></li>
              <li>Déficit LMP imputable revenu global : <span class="badge ${rules.conformite?.lmpDeficitImputableGlobal ? 'ok' : 'warn'}">${rules.conformite?.lmpDeficitImputableGlobal ? 'Oui' : 'À vérifier'}</span></li>
            </ul>
          </article>
        </section>

        <div class="tip">Pour obtenir un PDF, fais Imprimer → Enregistrer au format PDF.</div>
      `;
    }

    function downloadTextFile(content, filename, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    let lastHtml = '';

    async function renderReport() {
      const reportContent = document.getElementById('reportContent');
      reportContent.innerHTML = 'Chargement du rapport fiscal...';

      try {
        const targets = [
          { key: 'fiscalite_client', path: '../js/fiscalite-v2.js' }
        ];

        const sources = {};
        for (const target of targets) {
          const response = await fetch(target.path, { cache: 'no-store' });
          if (!response.ok) {
            throw new Error(`Impossible de charger ${target.path}`);
          }
          const content = await response.text();
          sources[target.key] = { content };
        }
        // taux-fiscaux-config.js est chargé via <script> dans le <head>
        sources.taux_fiscaux_config = { content: '' };

        const now = new Date();
        const isoDate = now.toISOString();
        const rules = parseFiscalRulesFromSources(sources);
        lastHtml = buildHtml({ exportedAt: isoDate, exportedBy: 'admin', rules });
        reportContent.innerHTML = lastHtml;
      } catch (error) {
        reportContent.innerHTML = `<div class="error">Erreur chargement rapport fiscal: ${escapeHtml(error?.message || error)}</div>`;
      }
    }

    document.getElementById('btnRefresh').addEventListener('click', renderReport);
    document.getElementById('btnExport').addEventListener('click', () => {
      if (!lastHtml) return;
      const fileDate = new Date().toISOString().slice(0, 10);
      downloadTextFile(lastHtml, `rapport-regles-fiscales-client-${fileDate}.html`, 'text/html;charset=utf-8');
    });

    renderReport();
  </script>
</body>
</html>
