<!DOCTYPE html>
<html lang="fr" data-theme="dark" class="theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Sentry Error Monitoring -->
    <script
      src="https://js-de.sentry-cdn.com/20fdc3b052d0030ec6c745effaedaf31.min.js"
      crossorigin="anonymous"
    ></script>
    <title>Nouveau mot de passe - LiveOwnerUnit</title>

    <!-- Thème immédiat -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('icalou-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.documentElement.classList.add('theme-' + savedTheme);
        })();
    </script>

    <link rel="stylesheet" href="../css/main.css?v=2.5.5" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg-primary);
            transition: background 0.3s ease;
        }

        .theme-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            background: var(--bg-secondary);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .theme-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .theme-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .theme-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(6, 182, 212, 0.3);
        }

        .login-wrapper {
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.5s ease-out;
        }

        .login-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(6, 182, 212, 0.3);
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
        }

        .logo h1 .unit-small {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: -2px;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .section-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-tertiary);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: #ffffff !important;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }

        .btn-submit:hover:not(:disabled) {
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            animation: slideDown 0.3s ease-out;
            line-height: 1.5;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .alert.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .password-requirements {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .password-requirements strong {
            color: var(--text-primary);
            display: block;
            margin-bottom: 8px;
        }

        .password-requirements ul {
            margin: 0;
            padding-left: 18px;
        }

        .password-requirements li {
            margin-bottom: 4px;
        }

        .info-text {
            text-align: center;
            margin-top: 24px;
            color: var(--text-tertiary);
            font-size: 13px;
        }

        .info-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .info-text a:hover {
            color: var(--secondary);
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        [data-theme="dark"] body {
            background: #0a0e1a;
        }

        [data-theme="dark"] .login-container {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(71, 85, 105, 0.3);
        }

        [data-theme="light"] body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        [data-theme="light"] .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-color: rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body>
    <!-- Switch thème -->
    <div class="theme-switch">
        <button class="theme-btn" id="t-light" onclick="setTheme('light')">☀️ Jour</button>
        <button class="theme-btn active" id="t-dark" onclick="setTheme('dark')">🌙 Nuit</button>
    </div>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="logo">
                <div class="logo-icon">🏡</div>
                <h1><span><span class="brand-cyan">L</span>ive<span class="brand-cyan">O</span>wner</span><span class="unit-small"><span class="brand-cyan">U</span>nit</span></h1>
                <p>Gestion Synchronisée de Gîtes</p>
            </div>

            <div class="section-title">Nouveau mot de passe</div>
            <div class="section-desc">
                Choisissez un nouveau mot de passe sécurisé pour votre compte.
            </div>

            <div id="alertMessage" class="alert"></div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="password">Nouveau mot de passe</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        minlength="8"
                        autocomplete="new-password"
                        placeholder="••••••••"
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="passwordConfirm">Confirmer le mot de passe</label>
                    <input
                        type="password"
                        id="passwordConfirm"
                        name="passwordConfirm"
                        required
                        minlength="8"
                        autocomplete="new-password"
                        placeholder="••••••••"
                    >
                </div>

                <div class="password-requirements">
                    <strong>Exigences :</strong>
                    <ul>
                        <li>Au moins 8 caractères</li>
                        <li>Mélange de lettres et chiffres recommandé</li>
                        <li>Caractères spéciaux recommandés</li>
                    </ul>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">
                    Enregistrer le nouveau mot de passe
                </button>
            </form>

            <div class="info-text">
                <a href="login.html">← Retour à la connexion</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/shared-config.js"></script>

    <script>
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.className = 'theme-' + theme;
            localStorage.setItem('icalou-theme', theme);
            document.getElementById('t-light').classList.toggle('active', theme === 'light');
            document.getElementById('t-dark').classList.toggle('active', theme === 'dark');
        }

        (function() {
            const savedTheme = localStorage.getItem('icalou-theme') || 'dark';
            setTheme(savedTheme);
        })();

        const form = document.getElementById('resetPasswordForm');
        const alertMessage = document.getElementById('alertMessage');
        const btnSubmit = document.getElementById('btnSubmit');
        let recoverySessionReady = false;

        function showAlert(message, type = 'error') {
            alertMessage.innerHTML = message;
            alertMessage.className = `alert ${type}`;
            alertMessage.style.display = 'block';
        }

        function setLoading(isLoading) {
            document.getElementById('password').disabled = isLoading;
            document.getElementById('passwordConfirm').disabled = isLoading;
            btnSubmit.disabled = isLoading;
            if (isLoading) {
                btnSubmit.innerHTML = '<span class="loading"></span>Enregistrement...';
            } else {
                btnSubmit.textContent = 'Enregistrer le nouveau mot de passe';
            }
        }

        // Écouter l'événement PASSWORD_RECOVERY de Supabase v2
        // Supabase traite automatiquement le token du fragment URL et déclenche cet événement
        window.supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                recoverySessionReady = true;
                // La session de récupération est prête, activer le formulaire
                btnSubmit.disabled = false;
            }
        });

        // Vérifier le fragment URL dès le chargement (token type=recovery)
        window.addEventListener('load', () => {
            const hash = window.location.hash;
            const hasToken = hash && (hash.includes('access_token') || hash.includes('token_hash'));
            if (!hasToken) {
                // Pas de token : lien invalide ou déjà utilisé
                showAlert('⚠️ Ce lien de réinitialisation est invalide ou a déjà été utilisé.<br>Veuillez <a href="forgot-password.html">demander un nouveau lien</a>.', 'error');
                btnSubmit.disabled = true;
            } else {
                // Token présent, désactiver le bouton jusqu'à ce que Supabase confirme la session
                btnSubmit.disabled = true;
                // Si Supabase ne déclenche pas PASSWORD_RECOVERY dans 3s, on autorise quand même
                setTimeout(() => {
                    if (!recoverySessionReady) {
                        recoverySessionReady = true;
                        btnSubmit.disabled = false;
                    }
                }, 3000);
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertMessage.style.display = 'none';

            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;

            if (password !== passwordConfirm) {
                showAlert('Les mots de passe ne correspondent pas.');
                return;
            }

            if (password.length < 8) {
                showAlert('Le mot de passe doit contenir au moins 8 caractères.');
                return;
            }

            setLoading(true);

            try {
                const { error } = await window.supabaseClient.auth.updateUser({
                    password: password
                });

                if (error) throw error;

                showAlert('✅ Mot de passe modifié avec succès ! Redirection...', 'success');
                form.style.display = 'none';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                console.error('Erreur réinitialisation mot de passe:', error);
                let msg = 'Une erreur est survenue. Veuillez réessayer.';
                if (error.message && error.message.includes('expired')) {
                    msg = 'Ce lien a expiré. <a href="forgot-password.html">Demandez un nouveau lien</a>.';
                } else if (error.message) {
                    msg = error.message;
                }
                showAlert(msg);
                setLoading(false);
            }
        });
    </script>
</body>
</html>
