    <!-- Filtre erreurs extensions Chrome -->
    <script>
window.addEventListener('error', function(event) {
            const msg = event.message || '';
            const src = event.filename || '';
            if (src.includes('webpage_content_reporter') || 
                msg.includes('webpage_content_reporter') ||
                msg.includes('Unexpected token') || 
                msg.includes('export') ||
                msg.includes('import') ||
                msg.includes('zustand') ||
                src.includes('chrome-extension')) {
                event.preventDefault();
                event.stopImmediatePropagation();
                return true;
            }
        }, true);
        
        const _consoleError = console.error;
        console.error = function(...args) {
            const str = args.join(' ');
            if (str.includes('chrome-extension') || 
                str.includes('webpage_content_reporter') || 
                str.includes('Unexpected token') ||
                str.includes('zustand') ||
                str.includes('export')) {
                return;
            }
            _consoleError.apply(console, args);
        };
    </script>

    <script>
        // Client Supabase global
        const supabaseClient = window.supabaseClient;
        // isCurrentUserAdmin → window.isCurrentUserAdmin (shared-config.js)

        async function checkAdminAccess() {
            try {
                if (!supabaseClient) {
                    window.location.href = '../index.html';
                    return false;
                }

                const { data: { session }, error } = await supabaseClient.auth.getSession();
                if (error || !session?.user) {
                    window.location.href = '../index.html';
                    return false;
                }

                currentAdminUser = session.user;
                const isAdmin = await isCurrentUserAdmin(currentAdminUser);
                if (!isAdmin) {
                    alert('Accès refusé : Réservé aux administrateurs');
                    window.location.href = '../index.html';
                    return false;
                }

                return true;
            } catch (authError) {
                console.error('Erreur authentification communications:', authError);
                window.location.href = '../index.html';
                return false;
            }
        }
        
        // Switch entre mode texte et vidéo
        function switchMode(mode) {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            
            document.getElementById('modeText').style.display = mode === 'text' ? 'block' : 'none';
            document.getElementById('modeVideo').style.display = mode === 'video' ? 'block' : 'none';
            
            // Reset required
            if (mode === 'video') {
                document.getElementById('commTitre').required = false;
                document.getElementById('commMessage').required = false;
            } else {
                document.getElementById('commTitre').required = true;
                document.getElementById('commMessage').required = true;
            }
        }
        
        // Analyser une vidéo avec l'IA
        async function analyzeVideo() {
            const videoUrl = document.getElementById('videoUrl').value;
            
            if (!videoUrl) {
                alert('⚠️ Veuillez entrer une URL de vidéo');
                return;
            }
            
            const loader = document.getElementById('videoAnalysisLoader');
            loader.style.display = 'block';
            
            try {
                let analysis;
                
                // Mode démo en développement local
                if (isDev) {
                    await new Promise(resolve => setTimeout(resolve, 2000)); // Simuler délai
                    
                    // Extraire quelques infos de l'URL pour personnaliser
                    const urlLower = videoUrl.toLowerCase();
                    let sujetEstime = "gestion et optimisation";
                    if (urlLower.includes('marketing')) sujetEstime = "stratégies marketing";
                    else if (urlLower.includes('tech') || urlLower.includes('code')) sujetEstime = "développement technique";
                    else if (urlLower.includes('business')) sujetEstime = "développement business";
                    else if (urlLower.includes('manage')) sujetEstime = "management et leadership";
                    
                    analysis = {
                        analyse: `Cette vidéo traite de ${sujetEstime} pour les propriétaires de gîtes. Elle présente des conseils pratiques et des astuces concrètes que vous pouvez appliquer dans votre activité.`,
                        points_cles: [
                            "📊 Suivez vos principaux indicateurs : taux d'occupation, prix moyen par nuit, revenus mensuels",
                            "💡 Automatisez les tâches répétitives pour gagner du temps (réponses automatiques, check-in digital)",
                            "📈 Ajustez vos tarifs selon la saison et les événements locaux pour maximiser vos revenus",
                            "🎯 Soignez vos photos et votre description pour vous démarquer de la concurrence",
                            "⭐ Répondez rapidement aux messages (moins de 1h) pour augmenter vos réservations",
                            "🔧 Utilisez des outils de gestion pour simplifier votre quotidien"
                        ],
                        application: `Commencez par les actions les plus simples et mesurez les résultats. Testez ces conseils sur une courte période avant de les généraliser.`,
                        plan_action: [
                            "Améliorer vos photos et description d'annonce",
                            "Mettre en place des réponses automatiques aux questions fréquentes",
                            "Ajuster vos tarifs pour la prochaine haute saison"
                        ],
                        categorie: "optimisation",
                        priorite: "moyen",
                        tags: ["gestion", "optimisation", "conseils"],
                        cible: "tous"
                    };
                    // console.log('🧪 Mode démo activé - Simulation IA professionnelle');
                } else {
                    // Mode production avec API Claude
                const response = await fetch('/api/content-ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'analyze-video',
                        videoUrl: videoUrl
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ error: 'Erreur inconnue' }));
                    console.error('Erreur API:', response.status, errorData);
                    throw new Error(`API Error ${response.status}: ${errorData.error || 'Erreur inconnue'}`);
                }
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Erreur analyse');
                }
                
                analysis = data.analysis;
                }
                
                // Remplir le formulaire (commun aux 2 modes)
                document.getElementById('commTitre').value = "� Nouvelle Vidéo à Découvrir";
                
                let message = '';
                
                // Résumé
                if (analysis.analyse) {
                    message = `📝 RÉSUMÉ\n━━━━━━━━━━━━━━━━━━━━━━━━\n\n${analysis.analyse}\n\n`;
                }
                
                // Points importants
                if (analysis.points_cles && analysis.points_cles.length > 0) {
                    message += '✨ POINTS IMPORTANTS\n━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
                    analysis.points_cles.forEach((point, index) => {
                        // Gérer différents formats
                        if (typeof point === 'string') {
                            message += `${index + 1}. ${point}\n\n`;
                        } else if (point.titre && point.explication) {
                            message += `${index + 1}. ${point.titre}\n   ${point.explication}\n\n`;
                        } else if (point.texte) {
                            message += `${index + 1}. ${point.texte}\n\n`;
                        } else {
                            message += `${index + 1}. ${JSON.stringify(point)}\n\n`;
                        }
                    });
                }
                
                // À faire
                if (analysis.application) {
                    message += '💡 CE QUE VOUS POUVEZ FAIRE\n━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
                    message += `${analysis.application}\n\n`;
                }
                
                // Actions suggérées
                if (analysis.plan_action && analysis.plan_action.length > 0) {
                    message += '✅ ACTIONS SUGGÉRÉES\n━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
                    analysis.plan_action.forEach((action, index) => {
                        message += `${index + 1}. ${action}\n\n`;
                    });
                }
                
                // Métadonnées
                message += '━━━━━━━━━━━━━━━━━━━━━━━━\n📋 INFORMATIONS\n━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
                
                if (analysis.categorie) {
                    message += `📂 Catégorie : ${analysis.categorie}\n`;
                }
                
                if (analysis.priorite) {
                    const prioriteEmoji = {
                        'critique': '🔴',
                        'élevé': '🟠',
                        'moyen': '🟡',
                        'faible': '🟢'
                    };
                    message += `${prioriteEmoji[analysis.priorite] || '⚪'} Priorité : ${analysis.priorite}\n`;
                }
                
                
                message += `\n\n🎥 Accéder à la ressource : ${videoUrl}`;
                
                if (analysis.tags && analysis.tags.length > 0) {
                    message += '\n\n🏷️ ' + analysis.tags.map(t => `#${t}`).join(' ');
                }
                
                document.getElementById('commMessage').value = message;
                
                // Pré-remplir type et cible selon la catégorie
                const typeMapping = {
                    'fonctionnalité': 'info',
                    'technique': 'info',
                    'marketing': 'success',
                    'support': 'warning'
                };
                document.getElementById('commType').value = typeMapping[analysis.categorie] || 'info';
                document.getElementById('commCible').value = analysis.cible || 'all';
                
                // Passer en mode texte
                switchMode('text');
                
                lucide.createIcons();
                
            } catch (err) {
                console.error('Erreur analyse vidéo:', err);
                alert('❌ Erreur lors de l\'analyse. Vérifiez l\'URL et réessayez.');
            } finally {
                loader.style.display = 'none';
            }
        }
        
        // Améliorer le texte avec l'IA
        async function improveText() {
            const titre = document.getElementById('commTitre').value;
            const message = document.getElementById('commMessage').value;
            
            if (!titre || !message) {
                alert('⚠️ Veuillez remplir le titre et le message');
                return;
            }
            
            const loader = document.getElementById('textImprovementLoader');
            loader.style.display = 'block';
            
            try {
                let improved;
                
                // Mode démo en développement local
                if (isDev) {
                    await new Promise(resolve => setTimeout(resolve, 2000)); // Simuler délai
                    
                    // Analyse et amélioration intelligente
                    const messageLignes = message.split('\n');
                    const hasEmojis = /[\u{1F300}-\u{1F9FF}]/u.test(message);
                    const hasStructure = message.includes('\n\n') || message.includes('•') || message.includes('-');
                    
                    let improvedMessage = message;
                    
                    // Corrections basiques
                    improvedMessage = improvedMessage.replace(/  +/g, ' '); // Espaces multiples
                    improvedMessage = improvedMessage.charAt(0).toUpperCase() + improvedMessage.slice(1); // Majuscule
                    
                    // Ajouter structure si manquante
                    if (!hasStructure && messageLignes.length > 3) {
                        const phrases = improvedMessage.split('. ');
                        improvedMessage = phrases[0] + '.\n\n' + phrases.slice(1).map((p, i) => {
                            const emoji = ['💡', '🎯', '⚡', '✨', '📈'][i % 5];
                            return `${emoji} ${p}`;
                        }).join('\n\n');
                    }
                    
                    // Ajouter call-to-action
                    if (!improvedMessage.toLowerCase().includes('question') && !improvedMessage.includes('?')) {
                        improvedMessage += '\n\n💬 Des questions ? Notre équipe support est à votre disposition !';
                    }
                    
                    improved = {
                        titre: titre.trim().charAt(0).toUpperCase() + titre.trim().slice(1),
                        message: improvedMessage,
                        analyse: `Améliorations appliquées :\n• ${hasEmojis ? 'Emojis optimisés' : 'Ajout d\'émojis pour plus d\'impact visuel'}\n• ${hasStructure ? 'Structure améliorée' : 'Restructuration en points clés'}\n• Correction orthographique et ponctuation\n• Ajout d'un call-to-action\n• Ton professionnel mais chaleureux`,
                        score_avant: "6",
                        score_apres: "9",
                        ameliorations_cles: ["Structure optimisée avec paragraphes", "Emojis stratégiques ajoutés", "Call-to-action engageant"]
                    };
                    // console.log('🧪 Mode démo activé - Simulation amélioration professionnelle');
                } else {
                    // Mode production avec vraie API
                    const prompt = `Tu es un expert en communication professionnelle B2B SaaS. Améliore cette communication destinée aux clients d'une plateforme de gestion de gîtes et locations saisonnières.

TEXTE ACTUEL :
─────────────
TITRE : ${titre}
MESSAGE : ${message}
─────────────

TON OBJECTIF : Transformer ce texte en une communication percutante, professionnelle mais chaleureuse, qui :
1. Capte l'attention immédiatement
2. Communique clairement la valeur ajoutée
3. Incite à l'action
4. Renforce la relation client

RÈGLES D'AMÉLIORATION :
✓ Corriger TOUTES les fautes (orthographe, grammaire, syntaxe)
✓ Restructurer pour une lecture fluide et aérée
✓ Utiliser des emojis stratégiquement (2-4 max, pertinents)
✓ Ajouter des paragraphes courts (max 3 lignes)
✓ Inclure un call-to-action si pertinent
✓ Ton : professionnel mais humain, éviter le jargon excessif
✓ Longueur : concis et impactant (max 250 mots)

STRUCTURE RECOMMANDÉE :
1. Hook/Accroche (1-2 lignes)
2. Corps principal (bénéfices/informations)
3. Call-to-action ou conclusion

FORMAT DE RÉPONSE REQUIS (JSON strict) :
{
  "titre": "Titre amélioré (max 80 caractères, emoji optionnel)",
  "message": "Message restructuré et amélioré avec sauts de lignes appropriés",
  "analyse": "Explication concise des améliorations (3-5 points bullet avec emoji)",
  "score_avant": "Note subjective 0-10 du texte original",
  "score_apres": "Note subjective 0-10 du texte amélioré",
  "ameliorations_cles": ["amélioration 1", "amélioration 2", "amélioration 3"]
}

IMPORTANT : Réponds UNIQUEMENT avec le JSON, sans texte additionnel.`;

                    const response = await fetch('/api/content-ai', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'improve-text',
                            titre: titre,
                            message: message
                        })
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({ error: 'Erreur inconnue' }));
                        console.error('Erreur API:', response.status, errorData);
                        throw new Error(`API Error ${response.status}: ${errorData.error || 'Erreur inconnue'}`);
                    }
                    
                    const data = await response.json();
                    
                    if (!data.success) {
                        throw new Error(data.error || 'Erreur amélioration');
                    }
                    
                    improved = data.improved;
                }
                
                // Confirmer avant de remplacer
                const confirmMessage = `✨ TEXTE AMÉLIORÉ\n\nTitre : ${improved.titre}\n\nRemplacer le texte actuel ?`;
                
                if (confirm(confirmMessage)) {
                    document.getElementById('commTitre').value = improved.titre;
                    document.getElementById('commMessage').value = improved.message;
                }
                
            } catch (err) {
                console.error('Erreur amélioration texte:', err);
                alert('❌ Erreur lors de l\'amélioration. Réessayez.');
            } finally {
                loader.style.display = 'none';
            }
        }
        
        // Charger les communications au démarrage
        document.addEventListener('DOMContentLoaded', async () => {
            const isAllowed = await checkAdminAccess();
            if (!isAllowed) {
                return;
            }

            setupUIEventDelegation();

            loadCommunications();
            lucide.createIcons();
        });

        function setupUIEventDelegation() {
            document.addEventListener('click', (event) => {
                const navButton = event.target.closest('[data-nav-url]');
                if (navButton) {
                    const targetUrl = navButton.getAttribute('data-nav-url');
                    if (targetUrl) {
                        window.location.href = targetUrl;
                    }
                    return;
                }

                const actionButton = event.target.closest('[data-action]');
                if (!actionButton) {
                    return;
                }

                const action = actionButton.getAttribute('data-action');
                switch (action) {
                    case 'coming-soon':
                        alert('Fonctionnalité à venir');
                        break;
                    case 'switch-mode': {
                        const mode = actionButton.getAttribute('data-mode');
                        if (mode) {
                            switchMode(mode);
                        }
                        break;
                    }
                    case 'analyze-video':
                        analyzeVideo();
                        break;
                    case 'improve-text':
                        improveText();
                        break;
                    case 'delete-communication': {
                        const id = actionButton.getAttribute('data-comm-id');
                        if (id) {
                            deleteCommunication(id);
                        }
                        break;
                    }
                    default:
                        break;
                }
            });
        }
        
        // Charger les communications
        async function loadCommunications() {
            try {
                const { data, error } = await supabaseClient
                    .from('admin_communications')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                const container = document.getElementById('listeCommunications');
                
                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i data-lucide="inbox"></i>
                            <p>Aucune communication active</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }
                
                container.innerHTML = data.map(comm => {
                    const isActive = !comm.date_fin || new Date(comm.date_fin) >= new Date();
                    const badgeClass = `badge-${comm.type}`;
                    const safeId = String(comm.id || '').replace(/'/g, "\\'");
                    const safeTitre = escapeHtml(comm.titre || '');
                    const safeType = escapeHtml(comm.type || '');
                    const safeMessage = escapeHtml(comm.message || '');
                    const safeCible = escapeHtml(comm.cible || '');
                    
                    return `
                        <div class="comm-item" style="opacity: ${isActive ? 1 : 0.5}">
                            <div class="comm-header">
                                <div class="comm-title">${safeTitre}</div>
                                <div class="comm-badges">
                                    <span class="badge ${badgeClass}">${safeType}</span>
                                    <button class="btn-delete" data-action="delete-communication" data-comm-id="${safeId}" title="Supprimer">
                                        <i data-lucide="trash-2" style="width: 14px; height: 14px; color: #dc2626;"></i>
                                    </button>
                                </div>
                            </div>
                            <p class="comm-message">${safeMessage}</p>
                            <div class="comm-meta">
                                <span><i data-lucide="users" style="width: 12px; height: 12px;"></i> ${safeCible}</span>
                                <span><i data-lucide="calendar" style="width: 12px; height: 12px;"></i> ${new Date(comm.created_at).toLocaleDateString('fr-FR')}</span>
                                ${comm.date_fin ? `<span><i data-lucide="clock" style="width: 12px; height: 12px;"></i> Expire le ${new Date(comm.date_fin).toLocaleDateString('fr-FR')}</span>` : '<span>Permanent</span>'}
                            </div>
                        </div>
                    `;
                }).join('');
                
                lucide.createIcons();
            } catch (err) {
                console.error('Erreur chargement communications:', err);
                document.getElementById('listeCommunications').innerHTML = `
                    <div class="empty-state">
                        <p style="color: #dc2626;">❌ Erreur lors du chargement</p>
                    </div>
                `;
            }
        }
        
        // Créer une communication
        document.getElementById('formCommunication').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const comm = {
                titre: document.getElementById('commTitre').value,
                message: document.getElementById('commMessage').value,
                type: document.getElementById('commType').value,
                date_fin: document.getElementById('commDateFin').value || null,
                cible: document.getElementById('commCible').value,
                created_at: new Date().toISOString()
            };
            
            try {
                const { error } = await supabaseClient.from('admin_communications').insert([comm]);
                if (error) throw error;
                
                // Reset form
                this.reset();
                loadCommunications();
                
                // Notification succès
                alert('✅ Communication publiée avec succès !');
            } catch (err) {
                console.error('Erreur création communication:', err);
                alert('❌ Erreur: ' + err.message);
            }
        });
        
        // Supprimer une communication
        async function deleteCommunication(id) {
            if (!confirm('Supprimer cette communication ?')) return;
            
            try {
                const { error } = await supabaseClient.from('admin_communications').delete().eq('id', id);
                if (error) throw error;
                loadCommunications();
            } catch (err) {
                console.error('Erreur suppression:', err);
                alert('Erreur: ' + err.message);
            }
        }

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = String(value || '');
            return div.innerHTML;
        }
    </script>
</body>
</html>
