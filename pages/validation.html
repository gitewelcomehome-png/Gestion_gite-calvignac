<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Ménages - Entreprise</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Configuration partagée -->
    <script src="../js/shared-config.js"></script>
    
    <!-- 🏢 MULTI-TENANT: Gestionnaire dynamique des gîtes -->
    <script src="../js/gites-manager.js"></script>
    
    <!-- 🛡️ PHASE 3 SÉCURITÉ: Protection XSS -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script type="module" src="../js/security-utils.js"></script>
    
    <!-- CSS Neo-Brutalism du site -->
    <link rel="stylesheet" href="../css/main.css?v=1.0" />
    
    <style>
        /* FORCER MODE JOUR UNIQUEMENT */
        :root, html, html.theme-dark {
            --bg-primary: #f5f5f7 !important;
            --bg-secondary: #ffffff !important;
            --text-primary: #1d1d1f !important;
            --text-secondary: #64748b !important;
            --border-color: #e5e7eb !important;
            --shadow: 0 2px 8px rgba(0,0,0,0.08) !important;
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.12) !important;
            --btn-neutral: #f8f9fa !important;
            --btn-neutral-bg: #e9ecef !important;
        }

        html, body {
            background: #f5f5f7 !important;
            color: #1d1d1f !important;
        }

        body {
            padding-top: 20px !important;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            border: 3px solid #2D3436;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 4px 4px 0 #2D3436;
            text-align: center;
        }

        .header h1 {
            color: #2D3436;
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .header p {
            color: #636e72;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .week-card {
            background: white;
            border: 3px solid #2D3436;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 4px 4px 0 #2D3436;
        }

        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: white;
            border: 3px solid #2D3436;
            border-radius: 10px;
            box-shadow: 3px 3px 0 #2D3436;
        }

        .week-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #2D3436;
            text-transform: uppercase;
        }

        .week-dates {
            color: #636e72;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .gites-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 10px;
        }

        .gite-column {
            width: 100%;
            background: white;
            border: 3px solid #2D3436;
            border-radius: 12px;
            padding: 0;
            box-shadow: 4px 4px 0 #2D3436;
        }

        .gite-header {
            font-size: 1.1rem;
            font-weight: 700;
            padding: 15px;
            color: #2D3436;
            text-align: center;
            border-bottom: 3px solid #2D3436;
            border-radius: 9px 9px 0 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: white;
        }

        /* Style Vision Globale - fond léger coloré */
        .gite-column[data-gite-slug*="trvoux"] .gite-header {
            background: rgba(102, 126, 234, 0.08);
            border-bottom-color: #667eea;
            color: #667eea;
        }

        .gite-column[data-gite-slug*="couzon"] .gite-header {
            background: rgba(231, 76, 60, 0.08);
            border-bottom-color: #E74C3C;
            color: #E74C3C;
        }

        .gite-column[data-gite-slug*="3me"] .gite-header {
            background: rgba(39, 174, 96, 0.08);
            border-bottom-color: #27AE60;
            color: #27AE60;
        }

        .gite-column[data-gite-slug*="4me"] .gite-header {
            background: rgba(162, 155, 254, 0.08);
            border-bottom-color: #a29bfe;
            color: #a29bfe;
        }

        /* Items de ménage - Style Vision Globale */
        .menage-item {
            background: white;
            border-radius: 10px;
            padding: 16px;
            margin: 12px;
            transition: all 0.2s;
        }

        /* Couleurs des bordures et ombres par gîte */
        .gite-column[data-gite-slug*="trvoux"] .menage-item {
            border: 2px solid #667eea !important;
            box-shadow: 2px 2px 0 #667eea !important;
        }

        .gite-column[data-gite-slug*="couzon"] .menage-item {
            border: 2px solid #E74C3C !important;
            box-shadow: 2px 2px 0 #E74C3C !important;
        }

        .gite-column[data-gite-slug*="3me"] .menage-item {
            border: 2px solid #27AE60 !important;
            box-shadow: 2px 2px 0 #27AE60 !important;
        }

        .gite-column[data-gite-slug*="4me"] .menage-item {
            border: 2px solid #a29bfe !important;
            box-shadow: 2px 2px 0 #a29bfe !important;
        }

        .menage-item:hover {
            transform: translate(-1px, -1px);
        }

        .gite-column[data-gite-slug*="trvoux"] .menage-item:hover {
            box-shadow: 3px 3px 0 #667eea !important;
        }

        .gite-column[data-gite-slug*="couzon"] .menage-item:hover {
            box-shadow: 3px 3px 0 #E74C3C !important;
        }

        .gite-column[data-gite-slug*="3me"] .menage-item:hover {
            box-shadow: 3px 3px 0 #27AE60 !important;
        }

        .gite-column[data-gite-slug*="4me"] .menage-item:hover {
            box-shadow: 3px 3px 0 #a29bfe !important;
        }

        .menage-date {
            font-weight: 700;
            color: #2D3436;
            margin-bottom: 8px;
            font-size: 1.05rem;
        }

        .menage-client {
            color: #636e72;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .menage-period {
            font-size: 0.9rem;
            color: #636e72;
            margin-bottom: 10px;
            padding: 5px 10px;
            background: rgba(0,0,0,0.03);
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            font-weight: 600;
        }

        .time-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .time-btn {
            flex: 1;
            padding: 8px;
            border: 2px solid #2D3436;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            box-shadow: 2px 2px 0 #2D3436;
        }

        .time-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 #2D3436;
        }

        .time-btn.selected {
            background: #74b9ff;
            color: #2D3436;
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #2D3436;
        }

        .date-selector {
            margin-bottom: 10px;
        }

        .date-selector label {
            display: block;
            font-weight: 700;
            margin-bottom: 5px;
            color: #2D3436;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .date-selector input[type="date"] {
            width: 100%;
            padding: 8px;
            border: 2px solid #2D3436;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1 1 auto;
            min-width: 0;
            max-width: 100%;
            padding: 10px 12px;
            border: 2px solid #2D3436;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            box-shadow: 3px 3px 0 #2D3436;
            text-transform: uppercase;
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #2D3436;
        }

        .btn:active {
            transform: translate(1px, 1px);
            box-shadow: 2px 2px 0 #2D3436;
        }

        .btn-validate {
            background: #55efc4;
            color: #2D3436;
        }

        .btn-propose {
            background: #74b9ff;
            color: #2D3436;
        }

        .btn-cancel {
            background: #ff6b6b;
            color: white;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-waiting {
            background: #d1ecf1;
            color: #0c5460;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .status-validated {
            background: #d4edda;
            color: #155724;
        }

        .status-owner-validated {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .status-refused {
            background: #f8d7da;
            color: #721c24;
        }

        .status-modified {
            background: #d1ecf1;
            color: #0c5460;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .auto-conflict-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auto-conflict-modal {
            width: min(760px, 100%);
            max-height: 85vh;
            overflow: auto;
            background: #fff;
            border: 3px solid #2D3436;
            border-radius: 14px;
            box-shadow: 6px 6px 0 #2D3436;
            padding: 20px;
        }

        .auto-conflict-modal h2 {
            margin: 0 0 8px 0;
            font-size: 1.4rem;
            color: #2D3436;
        }

        .auto-conflict-modal p {
            margin: 0 0 14px 0;
            color: #555;
            font-weight: 600;
        }

        .auto-conflict-modal-item {
            border: 2px solid #f39c12;
            border-radius: 8px;
            background: #fff8e1;
            padding: 10px 12px;
            margin-bottom: 10px;
            color: #7a5a00;
            font-weight: 600;
        }

        .auto-conflict-modal-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }

        @media (max-width: 768px) {
            .gites-container {
                flex-direction: column;
            }
            .gite-column {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧹 Validation des Ménages</h1>
            <p>Entreprise de ménage - Valider ou proposer d'autres dates</p>
        </div>

        <div id="notificationsBanner" style="display: none;"></div>

        <div id="planningContainer">
            <div class="week-card">
                <div class="empty-state">
                    <div class="empty-state-icon">⏳</div>
                    <h2>Chargement...</h2>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <span id="toastIcon" style="font-size: 1.5rem;">✓</span>
        <span id="toastMessage"></span>
    </div>

    <div id="autoConflictModalOverlay" class="auto-conflict-modal-overlay">
        <div class="auto-conflict-modal">
            <h2>⚠️ Replanification automatique détectée</h2>
            <p>Des ménages ont été replanifiés automatiquement suite à de nouvelles réservations. Merci de valider ces propositions.</p>
            <div id="autoConflictModalList"></div>
            <div class="auto-conflict-modal-actions">
                <button class="btn btn-validate" id="autoConflictModalCloseBtn">Compris</button>
            </div>
        </div>
    </div>

    <script>
        // Forcer mode jour uniquement
        document.documentElement.classList.add('theme-light');
        document.documentElement.classList.remove('theme-dark');
        
        // Utiliser le client Supabase déjà initialisé dans shared-config.js
        let supabaseClient = window.supabaseClient;

        // --- Mode token (lien partageable société) ---
        window.cleanerOwnerId = null;
        window.cleanerTokenMode = false;

        async function initTokenMode() {
            const token = new URLSearchParams(window.location.search).get('token');
            if (token) {
                try {
                    const { data: tokenData, error } = await supabaseClient
                        .rpc('validate_cleaner_token', { p_token: token })
                        .maybeSingle();
                    if (error || !tokenData) throw new Error('Token invalide ou introuvable');
                    window.cleanerOwnerId = tokenData.owner_user_id;
                    window.cleanerTokenMode = true;

                    // Recréer le client Supabase avec le header x-cleaner-token
                    // → les RLS policies côté BDD filtrent automatiquement par owner
                    const { createClient } = window.supabase;
                    window.supabaseClient = createClient(
                        window.APP_CONFIG.SUPABASE_URL,
                        window.APP_CONFIG.SUPABASE_KEY,
                        { global: { headers: { 'x-cleaner-token': token } } }
                    );
                    supabaseClient = window.supabaseClient;
                } catch (e) {
                    document.body.innerHTML = '<div style="padding:40px;text-align:center;"><h2>❌ Lien invalide ou expiré</h2></div>';
                    throw e;
                }
            } else {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) { window.location.href = '/'; return; }
                window.cleanerOwnerId = user.id;
            }
        }

        function setSafeHtml(el, html) {
            if (!el) return;
            if (window.SecurityUtils && typeof window.SecurityUtils.setInnerHTML === 'function') {
                window.SecurityUtils.setInnerHTML(el, html);
            } else {
                el.innerHTML = html;
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const messageEl = document.getElementById('toastMessage');

            icon.textContent = type === 'success' ? '✓' : type === 'error' ? '✗' : 'ℹ';
            messageEl.textContent = message;
            
            toast.style.display = 'flex';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function displayNotifications(menages) {
            const banner = document.getElementById('notificationsBanner');
            
            // Calculer la date limite (dans 2 semaines)
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const twoWeeksLater = new Date(today);
            twoWeeksLater.setDate(today.getDate() + 14);
            
            // Filtrer les notifications des 2 prochaines semaines uniquement
            const menagesDeuxSemaines = menages.filter(m => {
                const menageDate = m.scheduledDate;
                return menageDate >= today && menageDate <= twoWeeksLater;
            });
            
            // Afficher UNIQUEMENT les refusés (à corriger)
            const notifications = menagesDeuxSemaines.filter(m => m.status === 'refused');
            
            if (notifications.length === 0) {
                banner.style.display = 'none';
                return;
            }
            
            let html = '<div class="notifications-banner">';
            html += '<div class="banner-header">';
            html += '<span>🔔 Refus à corriger (2 prochaines semaines)</span>';
            html += `<span class="notification-count">${notifications.length}</span>`;
            html += '</div>';
            
            notifications.forEach(menageInfo => {
                const menageDate = menageInfo.scheduledDate;
                const day = menageDate.getDate();
                const month = menageDate.getMonth() + 1;
                const year = menageDate.getFullYear();
                const dateFormatted = `${String(day).padStart(2, '0')}/${String(month).padStart(2, '0')}/${year}`;
                
                html += `<div class="notification-item refused">`;
                html += `<span class="notification-icon">❌</span>`;
                html += '<div class="notification-content">';
                html += `<div class="notification-title">Refusé par le propriétaire</div>`;
                html += `<div class="notification-details">`;
                html += `<strong>${menageInfo.reservation.gite}</strong> - ${menageInfo.reservation.nom || 'Client'} - `;
                html += `Ménage du ${dateFormatted}`;
                html += `</div>`;
                
                if (menageInfo.cleaning?.notes) {
                    html += `<div class="notification-reason">💬 Raison : ${menageInfo.cleaning.notes}</div>`;
                }
                
                html += '</div>';
                html += '</div>';
            });
            
            html += '</div>';
            setSafeHtml(banner, html);
            banner.style.display = 'block';
        }

        function parseLocalDate(dateStr) {
            const [day, month, year] = dateStr.split('/');
            return new Date(year, month - 1, day);
        }

        function getWeekNumber(date) {
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7));
            const yearStart = new Date(d.getFullYear(), 0, 1);
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function renderAutoConflictWarning(notes) {
            if (!notes || typeof notes !== 'string' || !notes.includes('[AUTO_CLEANING_CONFLICT]')) {
                return '';
            }

            const details = notes
                .replace('[AUTO_CLEANING_CONFLICT]', '')
                .split('|')
                .map(part => part.trim())
                .filter(Boolean)
                .map(part => `<li style="margin-bottom: 4px;">${part}</li>`)
                .join('');

            return `
                <div class="proposal-alert" style="background: #fff3cd; padding: 15px; margin: 10px 0; border: 2px solid #f39c12; border-radius: 8px; box-shadow: 2px 2px 0 #f39c12;">
                    <strong>⚠️ Warning conflit ménage / nouvelle réservation</strong>
                    <p style="margin: 8px 0 10px 0;">L'ancien ménage a été supprimé automatiquement. Deux nouveaux ménages ont été proposés (avant et après la nouvelle réservation).</p>
                    <ul style="margin: 0; padding-left: 18px; color: #856404;">${details}</ul>
                </div>
            `;
        }

        function showAutoConflictModal(menages) {
            const overlay = document.getElementById('autoConflictModalOverlay');
            const list = document.getElementById('autoConflictModalList');
            const closeBtn = document.getElementById('autoConflictModalCloseBtn');
            if (!overlay || !list || !closeBtn) return;

            const autoConflicts = (menages || []).filter(m =>
                (typeof m?.cleaning?.notes === 'string' && m.cleaning.notes.includes('[AUTO_CLEANING_CONFLICT]')) ||
                (typeof m?.notes === 'string' && m.notes.includes('[AUTO_CLEANING_CONFLICT]') && !!(m.scheduled_date || m.date || m.scheduledDate))
            );

            if (autoConflicts.length === 0) {
                overlay.style.display = 'none';
                return;
            }

            const rows = autoConflicts.map((m) => {
                const gite = m.giteName || m.reservation?.gite || m.gite_name || 'Gîte';
                const client = m.reservation?.client_name || m.reservation?.nom || m.client_name || 'Client';
                const dateObj =
                    m.scheduledDate ||
                    (m.scheduled_date ? new Date(`${m.scheduled_date}T00:00:00`) : null) ||
                    (m.date ? new Date(`${m.date}T00:00:00`) : null);
                const dateText = dateObj?.toLocaleDateString('fr-FR', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' }) || '-';
                return `<div class="auto-conflict-modal-item">${gite} — ${client}<br/>Date proposée : ${dateText}</div>`;
            }).join('');

            setSafeHtml(list, rows);
            overlay.style.display = 'flex';

            closeBtn.onclick = () => {
                overlay.style.display = 'none';
            };
        }

        async function loadAutoConflictRowsForModal(giteMap) {
            try {
                const { data: rows, error } = await supabaseClient
                    .from('cleaning_schedule')
                    .select('id, reservation_id, gite_id, scheduled_date, notes, status, proposed_by')
                    .eq('owner_user_id', window.cleanerOwnerId)
                    .ilike('notes', '%[AUTO_CLEANING_CONFLICT]%')
                    .neq('status', 'refused')
                    .order('scheduled_date', { ascending: true });

                if (error || !rows || rows.length === 0) return [];

                return rows.map(r => ({
                    ...r,
                    gite_name: giteMap?.[r.gite_id] || 'Gîte',
                    client_name: 'Client'
                }));
            } catch (_) {
                return [];
            }
        }

        async function loadPlanning() {
            const container = document.getElementById('planningContainer');
            
            try {
                // Charger les gîtes (mode token ou auth)
                let gites;
                if (window.cleanerTokenMode) {
                    const { data: gitesData } = await supabaseClient
                        .from('gites')
                        .select('*')
                        .eq('owner_user_id', window.cleanerOwnerId)
                        .order('name');
                    gites = gitesData;
                } else {
                    gites = await window.gitesManager.getAll();
                }
                if (!gites || gites.length === 0) {
                    console.error('❌ Aucun gîte trouvé');
                    return;
                }
                
                // Créer un map gite_id -> nom
                const giteMap = {};
                gites.forEach(g => {
                    giteMap[g.id] = g.name;
                });
                
                // Récupérer les réservations du bon propriétaire uniquement
                const { data: reservations, error: resError } = await supabaseClient
                    .from('reservations')
                    .select('*')
                    .eq('owner_user_id', window.cleanerOwnerId)
                    .order('check_out', { ascending: true });

                if (resError) throw resError;

                // Récupérer les ménages planifiés du bon propriétaire uniquement
                const { data: cleaningSchedules, error: cleanError } = await supabaseClient
                    .from('cleaning_schedule')
                    .select('*')
                    .eq('owner_user_id', window.cleanerOwnerId);

                if (cleanError) throw cleanError;

                // Organiser par semaine
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                const weeks = {};
                
                // console.log('🔍 DEBUG: Nombre de réservations:', reservations.length);
                // console.log('🔍 DEBUG: Nombre de cleaning_schedules:', cleaningSchedules?.length);
                
                reservations.forEach(res => {
                    const dateFin = new Date(res.check_out);
                    const today = new Date();
                    
                    if (dateFin < today) return; // Ignorer le passé

                    // Trouver le cleaning_schedule correspondant
                    const cleaning = cleaningSchedules?.find(c => c.reservation_id === res.id);
                    
                    // console.log(`📋 Réservation ${res.id} (${res.gite_id}) - check_out: ${res.check_out}`);
                    // console.log(`   ➡️ cleaning.scheduled_date: ${cleaning?.scheduled_date || 'AUCUN'}`);
                    
                    // Parser scheduled_date sans décalage horaire UTC
                    // Fallback sur cleaning.date (ancienne colonne) si scheduled_date est null
                    let scheduledDate;
                    const rawDate = cleaning?.scheduled_date || cleaning?.date;
                    if (rawDate) {
                        const [year, month, day] = rawDate.split('-');
                        scheduledDate = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
                    } else {
                        scheduledDate = dateFin;
                    }
                    
                    // Trouver le lundi de la semaine
                    const dayOfWeek = scheduledDate.getDay();
                    const monday = new Date(scheduledDate);
                    monday.setDate(scheduledDate.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
                    monday.setHours(0, 0, 0, 0);
                    
                    const weekKey = monday.toISOString().split('T')[0];
                    
                    if (!weeks[weekKey]) {
                        const sunday = new Date(monday);
                        sunday.setDate(monday.getDate() + 6);
                        
                        weeks[weekKey] = {
                            monday,
                            sunday,
                            weekNumber: getWeekNumber(monday),
                            gites: {} // Dynamique par gite_id
                        };
                        
                        // Initialiser un tableau pour chaque gîte
                        gites.forEach(g => {
                            weeks[weekKey].gites[g.id] = [];
                        });
                    }
                    
                    // Trouver la prochaine réservation pour définir la période disponible
                    // Filtrer, trier par date et prendre la plus proche
                    const nextRes = reservations
                        .filter(r => r.gite_id === res.gite_id && new Date(r.check_in) >= dateFin)
                        .sort((a, b) => new Date(a.check_in) - new Date(b.check_in))[0];
                    
                    const ownerValidatedModification = hasClientValidatedModification(cleaning?.notes);
                    const isValidatedStatus = cleaning?.status === 'validated' || cleaning?.status === 'confirmed';

                    const menageInfo = {
                        reservation: res,
                        cleaning: cleaning,
                        dateFin: dateFin,
                        scheduledDate: scheduledDate,
                        nextReservationDate: nextRes ? new Date(nextRes.check_in) : null,
                        timeOfDay: cleaning?.time_of_day || 'afternoon',
                        status: cleaning?.status || 'pending',
                        validated: isValidatedStatus || cleaning?.validated_by_company === true || ownerValidatedModification,
                        giteId: res.gite_id,
                        giteName: giteMap[res.gite_id] || 'Gîte inconnu'
                    };
                    
                    // Ajouter au gîte correspondant
                    if (weeks[weekKey].gites[res.gite_id]) {
                        weeks[weekKey].gites[res.gite_id].push(menageInfo);
                    }
                });

                // Générer HTML
                const sortedWeeks = Object.keys(weeks).sort();
                
                // Collecter tous les ménages pour les notifications
                const allMenages = [];
                Object.values(weeks).forEach(week => {
                    Object.values(week.gites).forEach(giteMenages => {
                        allMenages.push(...giteMenages);
                    });
                });
                
                // Calculer la date limite (dans 2 semaines) - réutilisation de today déjà déclaré
                const twoWeeksLater = new Date(today);
                twoWeeksLater.setDate(today.getDate() + 14);
                
                // Filtrer les ménages des 2 prochaines semaines uniquement
                const menagesDeuxSemaines = allMenages.filter(m => {
                    const menageDate = m.scheduledDate;
                    return menageDate >= today && menageDate <= twoWeeksLater;
                });
                
                // Compter nouveaux ménages (pending) et modifications en attente (pending_validation)
                // uniquement pour les 2 prochaines semaines
                const nbNew = menagesDeuxSemaines.filter(m => m.status === 'pending').length;
                const nbModified = menagesDeuxSemaines.filter(m => m.status === 'pending_validation').length;
                
                // Mettre à jour le titre de l'onglet avec compteurs
                const totalNotifications = nbNew + nbModified;
                if (totalNotifications > 0) {
                    let title = '(';
                    if (nbNew > 0) title += `🆕${nbNew}`;
                    if (nbNew > 0 && nbModified > 0) title += ' ';
                    if (nbModified > 0) title += `✏️${nbModified}`;
                    title += ') Validation Ménage';
                    document.title = title;
                } else {
                    document.title = 'Validation Ménage';
                }

                const modalRows = await loadAutoConflictRowsForModal(giteMap);

                // Afficher les notifications
                displayNotifications(allMenages);
                showAutoConflictModal([...allMenages, ...modalRows]);
                
                if (sortedWeeks.length === 0) {
                    setSafeHtml(container, `
                        <div class="week-card">
                            <div class="empty-state">
                                <div class="empty-state-icon">📭</div>
                                <h2>Aucun ménage à planifier</h2>
                                <p>Tous les ménages sont à jour</p>
                            </div>
                        </div>
                    `);
                    return;
                }

                let html = '';
                sortedWeeks.forEach(weekKey => {
                    const week = weeks[weekKey];
                    const weekDisplay = `${week.monday.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' })} - ${week.sunday.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' })}`;
                    
                    html += `
                        <div class="week-card">
                            <div class="week-header">
                                <div class="week-title">Semaine ${week.weekNumber}</div>
                                <div class="week-dates">${weekDisplay}</div>
                            </div>
                            <div class="gites-container">
                    `;
                    
                    // Générer une colonne par gîte
                    gites.forEach(gite => {
                        const giteMenages = week.gites[gite.id] || [];
                        const giteIcon = gite.icon || '🏠';
                        const giteColor = gite.color || '#667eea';
                        const giteSlug = gite.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                        
                        html += `
                            <div class="gite-column" data-gite-id="${gite.id}" data-gite-slug="${giteSlug}">
                                <div class="gite-header">
                                    ${gite.name}
                                </div>
                                ${giteMenages.length > 0 ? 
                                    giteMenages.map(m => generateMenageHTML(m)).join('') :
                                    '<p style="color: #999; padding: 20px; text-align: center; font-weight: 600;">Aucun ménage</p>'
                                }
                            </div>
                        `;
                    });
                    
                    html += `
                            </div>
                        </div>
                    `;
                });

                setSafeHtml(container, html);

            } catch (error) {
                console.error('Erreur:', error);
                setSafeHtml(container, `
                    <div class="week-card">
                        <div class="empty-state">
                            <div class="empty-state-icon">❌</div>
                            <h2>Erreur de chargement</h2>
                            <p>${error.message}</p>
                        </div>
                    </div>
                `);
            }
        }

        const CLIENT_MODIFICATION_VALIDATED_MARKER = '[MODIFICATION_VALIDEE_CLIENT]';

        function hasClientValidatedModification(notes) {
            return typeof notes === 'string' && notes.includes(CLIENT_MODIFICATION_VALIDATED_MARKER);
        }

        function stripClientValidatedMarker(notes) {
            if (typeof notes !== 'string') return notes || null;
            const cleaned = notes
                .split(CLIENT_MODIFICATION_VALIDATED_MARKER)
                .join('')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
            return cleaned || null;
        }

        async function getCleanedNotesWithoutClientMarker(reservationId) {
            try {
                const { data, error } = await supabaseClient
                    .from('cleaning_schedule')
                    .select('notes')
                    .eq('reservation_id', reservationId)
                    .maybeSingle();

                if (error) return null;
                return stripClientValidatedMarker(data?.notes || null);
            } catch (_) {
                return null;
            }
        }

        function generateMenageHTML(menage) {
            const { reservation, cleaning, dateFin, scheduledDate, nextReservationDate, timeOfDay, status, validated } = menage;
            const proposedBy = cleaning?.proposed_by; // Qui a proposé : 'owner' (site principal) ou 'company' (société)
            const autoConflictWarning = renderAutoConflictWarning(cleaning?.notes);
            const clientValidatedModification = hasClientValidatedModification(cleaning?.notes);
            
            const statusBadge = clientValidatedModification ?
                '<span class="status-badge status-owner-validated">✓ Modification validée par le propriétaire</span>' :
                validated ? 
                '<span class="status-badge status-validated">✓ Validé société ménage</span>' :
                status === 'pending_validation' && proposedBy === 'owner' ?
                '<span class="status-badge status-waiting">⏰ Proposition du site principal</span>' :
                status === 'pending_validation' && proposedBy === 'company' ?
                '<span class="status-badge status-waiting">⌛ En attente validation site principal</span>' :
                status === 'refused' ?
                '<span class="status-badge status-refused">✗ Refusé</span>' :
                '<span class="status-badge status-pending">⏳ En attente</span>';
            
            // Récupérer raison du refus si elle existe
            const refusalReason = cleaning?.notes && status === 'refused' ? cleaning.notes : null;
            
            // Formater dates sans décalage UTC
            const minDate = `${dateFin.getFullYear()}-${String(dateFin.getMonth() + 1).padStart(2, '0')}-${String(dateFin.getDate()).padStart(2, '0')}`;
            const maxDate = nextReservationDate ? `${nextReservationDate.getFullYear()}-${String(nextReservationDate.getMonth() + 1).padStart(2, '0')}-${String(nextReservationDate.getDate()).padStart(2, '0')}` : null;
            const scheduledDateISO = `${scheduledDate.getFullYear()}-${String(scheduledDate.getMonth() + 1).padStart(2, '0')}-${String(scheduledDate.getDate()).padStart(2, '0')}`;
            
            const periodText = nextReservationDate ?
                `🚪 Départ: ${dateFin.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' })} | 🔑 Entrée suivante: ${nextReservationDate.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' })}` :
                `🚪 Départ: ${dateFin.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' })}`;

            const dateInputId = `date-${reservation.id}`;
            const morningId = `morning-${reservation.id}`;
            const afternoonId = `afternoon-${reservation.id}`;
            const formId = `form-${reservation.id}`;

            return `
                <div class="menage-item ${validated ? 'validated' : status}">
                    ${statusBadge}
                    <div class="menage-date">
                        📅 ${scheduledDate.toLocaleDateString('fr-FR', { weekday: 'long', day: '2-digit', month: 'long' })}
                        ${timeOfDay === 'morning' ? '🌅 Matin' : '🌇 Après-midi'}
                    </div>
                    <div class="menage-period">📍 ${periodText}</div>
                    
                    ${refusalReason ? `
                        <div class="refusal-reason" style="background: #ffebee; padding: 10px; margin: 10px 0; border-left: 3px solid #f44336; border-radius: 4px;">
                            <strong>❌ Refusé par le client :</strong>
                            <p style="margin: 5px 0 0 0;">${refusalReason}</p>
                        </div>
                    ` : ''}

                    ${autoConflictWarning}
                    
                    ${!validated && status !== 'pending_validation' && status !== 'refused' ? `
                        <div id="${formId}" style="display: none;">
                            <div class="date-selector">
                                <label>Choisir une date :</label>
                                <input 
                                    type="date" 
                                    id="${dateInputId}"
                                    value="${scheduledDateISO}"
                                    min="${minDate}"
                                    ${maxDate ? `max="${maxDate}"` : ''}
                                    onchange="checkDateForMorning(${reservation.id}, '${minDate}')"
                                    data-departure-date="${minDate}"
                                />
                            </div>
                            
                            <div class="time-selector">
                                <button 
                                    type="button" 
                                    class="time-btn ${timeOfDay === 'morning' ? 'selected' : ''}" 
                                    id="${morningId}"
                                    onclick="selectTime('${reservation.id}', 'morning')"
                                >
                                    🌅 Matin
                                </button>
                                <button 
                                    type="button" 
                                    class="time-btn ${timeOfDay === 'afternoon' ? 'selected' : ''}"
                                    id="${afternoonId}"
                                    onclick="selectTime('${reservation.id}', 'afternoon')"
                                >
                                    🌇 Après-midi
                                </button>
                            </div>
                        </div>
                        
                        <div class="actions" id="actions-${reservation.id}">
                            <button class="btn btn-validate" onclick="validateMenage('${reservation.id}')" id="btn-validate-${reservation.id}">
                                ✓ Valider
                            </button>
                            <button class="btn btn-propose" onclick="showProposeForm('${reservation.id}')">
                                📝 Modifier la date
                            </button>
                        </div>
                    ` : status === 'pending_validation' && proposedBy === 'owner' ? `
                        <div class="proposal-alert" style="background: #e3f2fd; padding: 15px; margin: 10px 0; border: 2px solid #2196F3; border-radius: 8px; box-shadow: 2px 2px 0 #2196F3;">
                            <strong>📩 Proposition du site principal</strong>
                            <p style="margin: 8px 0;">Date proposée : <strong>${scheduledDate.toLocaleDateString('fr-FR', { weekday: 'long', day: '2-digit', month: 'long' })}</strong></p>
                        </div>
                        <div class="actions">
                            <button class="btn btn-validate" onclick="acceptProposal('${reservation.id}')">
                                ✓ Accepter la proposition
                            </button>
                            <button class="btn btn-cancel" onclick="cancelValidation('${reservation.id}')">
                                ↩️ Refuser la proposition
                            </button>
                        </div>
                    ` : status === 'pending_validation' && proposedBy === 'company' ? `
                        <div class="proposal-alert" style="background: #fff3cd; padding: 15px; margin: 10px 0; border: 2px solid #f39c12; border-radius: 8px; box-shadow: 2px 2px 0 #f39c12;">
                            <strong>⌛ En attente validation site principal</strong>
                            <p style="margin: 8px 0;">Vous avez proposé : <strong>${scheduledDate.toLocaleDateString('fr-FR', { weekday: 'long', day: '2-digit', month: 'long' })}</strong></p>
                            <p style="margin: 5px 0; font-size: 0.9em; color: #856404;">En attente de validation par le site principal</p>
                        </div>
                        <div class="actions">
                            <button class="btn btn-cancel" onclick="cancelValidation('${reservation.id}')">
                                ↩️ Annuler ma proposition
                            </button>
                        </div>
                    ` : validated ? `
                        <div class="actions">
                            <button class="btn btn-cancel" onclick="cancelValidation('${reservation.id}')">
                                ↩️ Annuler validation
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        let selectedTimes = {};
        
        function showProposeForm(reservationId) {
            const form = document.getElementById(`form-${reservationId}`);
            const btnValidate = document.getElementById(`btn-validate-${reservationId}`);
            const btnPropose = document.querySelector(`#actions-${reservationId} .btn-propose`);
            
            if (form) {
                form.style.display = 'block';
                // Cacher le bouton Valider, changer le texte et l'action du bouton Modifier
                if (btnValidate) btnValidate.style.display = 'none';
                if (btnPropose) {
                    btnPropose.textContent = '📝 Proposer cette date';
                    btnPropose.onclick = () => proposeMenage(reservationId);
                }
                
                // Vérifier si on peut proposer le matin
                const dateInput = document.getElementById(`date-${reservationId}`);
                checkDateForMorning(reservationId, dateInput.dataset.departureDate);
            }
        }

        function checkDateForMorning(reservationId, departureDate) {
            const dateInput = document.getElementById(`date-${reservationId}`);
            const morningBtn = document.getElementById(`morning-${reservationId}`);
            const selectedDate = dateInput.value;
            
            // Si la date sélectionnée = date de départ, bloquer le matin
            if (selectedDate === departureDate) {
                morningBtn.disabled = true;
                morningBtn.style.opacity = '0.5';
                morningBtn.style.cursor = 'not-allowed';
                morningBtn.title = 'Matin impossible le jour du départ';
                
                // Forcer l'après-midi
                selectTime(reservationId, 'afternoon');
            } else {
                morningBtn.disabled = false;
                morningBtn.style.opacity = '1';
                morningBtn.style.cursor = 'pointer';
                morningBtn.title = '';
            }
        }
        
        function selectTime(reservationId, timeOfDay) {
            selectedTimes[reservationId] = timeOfDay;
            
            const morningBtn = document.getElementById(`morning-${reservationId}`);
            const afternoonBtn = document.getElementById(`afternoon-${reservationId}`);
            
            if (timeOfDay === 'morning') {
                morningBtn.classList.add('selected');
                afternoonBtn.classList.remove('selected');
            } else {
                morningBtn.classList.remove('selected');
                afternoonBtn.classList.add('selected');
            }
        }

        async function validateMenage(reservationId) {
            const dateInput = document.getElementById(`date-${reservationId}`);
            
            // Si le formulaire est caché, utiliser les valeurs actuelles
            const form = document.getElementById(`form-${reservationId}`);
            let scheduledDate, timeOfDay;
            
            if (form && form.style.display === 'none') {
                // Valider la proposition actuelle
                scheduledDate = dateInput.value;
                timeOfDay = selectedTimes[reservationId] || 'afternoon';
            } else {
                // Utiliser les valeurs du formulaire
                scheduledDate = dateInput.value;
                timeOfDay = selectedTimes[reservationId] || 'afternoon';
            }
            
            if (!scheduledDate) {
                showToast('Veuillez sélectionner une date', 'error');
                return;
            }
            
            try {
                // Récupérer les infos de la réservation pour le gite
                const { data: reservation, error: resError } = await supabaseClient
                    .from('reservations')
                    .select('gite_id, check_out, check_in')
                    .eq('id', reservationId)
                    .single();
                
                if (resError) throw resError;
                
                const { error } = await supabaseClient
                    .from('cleaning_schedule')
                    .upsert({
                        owner_user_id: window.cleanerOwnerId,
                        reservation_id: reservationId,
                        gite_id: reservation.gite_id,
                        scheduled_date: scheduledDate,
                        date: scheduledDate,
                        time_of_day: timeOfDay,
                        status: 'validated',
                        validated_by_company: true,
                        notes: await getCleanedNotesWithoutClientMarker(reservationId),
                        reservation_end: reservation.check_out
                    }, { onConflict: 'reservation_id' });
                
                if (error) throw error;
                
                showToast('✓ Ménage validé !', 'success');
                await loadPlanning();
            } catch (error) {
                console.error(error);
                showToast('Erreur: ' + error.message, 'error');
            }
        }

        async function proposeMenage(reservationId) {
            const dateInput = document.getElementById(`date-${reservationId}`);
            const scheduledDate = dateInput.value;
            const timeOfDay = selectedTimes[reservationId] || 'afternoon';
            
            if (!scheduledDate) {
                showToast('Veuillez sélectionner une date', 'error');
                return;
            }
            
            try {
                // Récupérer les infos de la réservation pour le gite
                const { data: reservation, error: resError } = await supabaseClient
                    .from('reservations')
                    .select('gite_id, check_out, check_in')
                    .eq('id', reservationId)
                    .single();
                
                if (resError) throw resError;
                
                const dataToPropose = {
                    owner_user_id: window.cleanerOwnerId,
                    reservation_id: reservationId,
                    gite_id: reservation.gite_id,
                    scheduled_date: scheduledDate,
                    date: scheduledDate,
                    time_of_day: timeOfDay,
                    status: 'pending_validation',
                    proposed_by: 'company',
                    notes: await getCleanedNotesWithoutClientMarker(reservationId),
                    validated_by_company: false
                };
                
                // console.log('📤 Données à proposer:', dataToPropose);
                
                const { data, error } = await supabaseClient
                    .from('cleaning_schedule')
                    .upsert(dataToPropose, { onConflict: 'reservation_id' });
                
                if (error) {
                    console.error('❌ Erreur Supabase:', error);
                    throw error;
                }
                
                // console.log('✅ Proposition envoyée au site principal:', data);
                
                showToast('📝 Proposition envoyée au site principal pour validation', 'success');
                await loadPlanning();
            } catch (error) {
                console.error(error);
                showToast('Erreur: ' + error.message, 'error');
            }
        }

        async function acceptProposal(reservationId) {
            try {
                const { error } = await supabaseClient
                    .from('cleaning_schedule')
                    .update({
                        status: 'validated',
                        validated_by_company: true,
                        notes: await getCleanedNotesWithoutClientMarker(reservationId)
                    })
                    .eq('reservation_id', reservationId);
                
                if (error) throw error;
                
                showToast('✓ Proposition acceptée !', 'success');
                await loadPlanning();
            } catch (error) {
                console.error(error);
                showToast('Erreur: ' + error.message, 'error');
            }
        }

        async function cancelValidation(reservationId) {
            if (!confirm('Annuler la validation ?')) return;
            
            try {
                const { error } = await supabaseClient
                    .from('cleaning_schedule')
                    .update({
                        status: 'pending',
                        validated_by_company: false,
                        notes: await getCleanedNotesWithoutClientMarker(reservationId)
                    })
                    .eq('reservation_id', reservationId);
                
                if (error) throw error;
                
                showToast('↩️ Validation annulée', 'success');
                await loadPlanning();
            } catch (error) {
                console.error(error);
                showToast('Erreur: ' + error.message, 'error');
            }
        }

        // Charger au démarrage (après init token)
        initTokenMode().then(() => {
            loadPlanning();
            setInterval(loadPlanning, 30000);
        }).catch(() => {});
    </script>
</body>
</html>
