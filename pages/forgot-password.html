<!DOCTYPE html>
<html lang="fr" data-theme="dark" class="theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Sentry Error Monitoring -->
    <script
      src="https://js-de.sentry-cdn.com/20fdc3b052d0030ec6c745effaedaf31.min.js"
      crossorigin="anonymous"
    ></script>
    <title>Mot de passe oublié - LiveOwnerUnit</title>
    
    <!-- Thème immédiat -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('icalou-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.documentElement.classList.add('theme-' + savedTheme);
        })();
    </script>
    
    <link rel="stylesheet" href="../css/main.css?v=2.5.5" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg-primary);
            transition: background 0.3s ease;
        }

        .theme-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            background: var(--bg-secondary);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .theme-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .theme-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .theme-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(6, 182, 212, 0.3);
        }

        .login-wrapper {
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.5s ease-out;
        }

        .login-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(6, 182, 212, 0.3);
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
        }

        .logo h1 .unit-small {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: -2px;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .section-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-tertiary);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: #ffffff !important;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }

        .btn-submit:hover:not(:disabled) {
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            animation: slideDown 0.3s ease-out;
            line-height: 1.5;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .alert.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .info-text {
            text-align: center;
            margin-top: 24px;
            color: var(--text-tertiary);
            font-size: 13px;
        }

        .info-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .info-text a:hover {
            color: var(--secondary);
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        [data-theme="dark"] body {
            background: #0a0e1a;
        }

        [data-theme="dark"] .login-container {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(71, 85, 105, 0.3);
        }

        [data-theme="light"] body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        [data-theme="light"] .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-color: rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body>
    <!-- Switch thème -->
    <div class="theme-switch">
        <button class="theme-btn" id="t-light" onclick="setTheme('light')">☀️ Jour</button>
        <button class="theme-btn active" id="t-dark" onclick="setTheme('dark')">🌙 Nuit</button>
    </div>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="logo">
                <div class="logo-icon">🏡</div>
                <h1><span><span class="brand-cyan">L</span>ive<span class="brand-cyan">O</span>wner</span><span class="unit-small"><span class="brand-cyan">U</span>nit</span></h1>
                <p>Gestion Synchronisée de Gîtes</p>
            </div>

            <div class="section-title">Mot de passe oublié</div>
            <div class="section-desc">
                Saisissez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de passe.
            </div>

            <div id="alertMessage" class="alert"></div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Adresse email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        autocomplete="email"
                        placeholder="votre@email.com"
                        autofocus
                    >
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">
                    Envoyer le lien de réinitialisation
                </button>
            </form>

            <div class="info-text">
                <a href="login.html">← Retour à la connexion</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/shared-config.js"></script>

    <script>
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.className = 'theme-' + theme;
            localStorage.setItem('icalou-theme', theme);
            document.getElementById('t-light').classList.toggle('active', theme === 'light');
            document.getElementById('t-dark').classList.toggle('active', theme === 'dark');
        }

        (function() {
            const savedTheme = localStorage.getItem('icalou-theme') || 'dark';
            setTheme(savedTheme);
        })();

        const forgotForm = document.getElementById('forgotForm');
        const emailInput = document.getElementById('email');
        const btnSubmit = document.getElementById('btnSubmit');
        const alertMessage = document.getElementById('alertMessage');

        function showAlert(message, type = 'error') {
            alertMessage.innerHTML = message;
            alertMessage.className = `alert ${type}`;
            alertMessage.style.display = 'block';
        }

        function setLoading(isLoading) {
            emailInput.disabled = isLoading;
            btnSubmit.disabled = isLoading;
            if (isLoading) {
                btnSubmit.innerHTML = '<span class="loading"></span>Envoi en cours...';
            } else {
                btnSubmit.textContent = 'Envoyer le lien de réinitialisation';
            }
        }

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertMessage.style.display = 'none';

            const email = emailInput.value.trim();
            if (!email) {
                showAlert('Veuillez saisir votre adresse email.');
                return;
            }

            setLoading(true);

            try {
                const redirectTo = window.location.origin + '/pages/reset-password.html';

                const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: redirectTo
                });

                if (error) throw error;

                // Afficher le message de succès et masquer le formulaire
                forgotForm.style.display = 'none';
                showAlert(
                    '✅ Si un compte existe avec cette adresse, un email de réinitialisation a été envoyé.<br><br>' +
                    'Vérifiez votre boîte de réception (et vos spams).',
                    'success'
                );

            } catch (error) {
                console.error('Erreur réinitialisation mot de passe:', error);
                showAlert('Une erreur est survenue. Veuillez réessayer.');
                setLoading(false);
            }
        });
    </script>
</body>
</html>
